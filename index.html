                    {msg && <div className="bg-green-50 text-green-700 p-4 rounded-xl border border-green-200 font-bold flex items-center gap-2 animate-in fade-in"><CheckCircle2 className="w-5 h-5"/>{msg}</div>}
                    
                    <form onSubmit={handleSubmit} className="bg-white border border-slate-200 rounded-3xl p-8 shadow-sm space-y-6">
                        <div className="bg-orange-50 border border-orange-100 rounded-2xl p-5 grid grid-cols-1 md:grid-cols-2 gap-5 mb-6">
                            <div className="md:col-span-2"><label className="block text-sm font-bold mb-2 text-orange-900">الصنف المستهلك</label><select required value={formData.itemId} onChange={e=>setFormData({...formData, itemId: e.target.value})} className="w-full p-3.5 border border-orange-200 rounded-xl outline-none bg-white font-bold text-slate-800 focus:ring-2 focus:ring-orange-400"><option value="">-- اختر من قائمة المواد المتاحة --</option>{consumableItems.map(i => <option key={i.id} value={i.id}>{i.name} (متوفر: {i.quantity} {i.unit})</option>)}</select></div>
                            <div><label className="block text-sm font-bold mb-2 text-orange-900">الكمية المسحوبة</label><input required type="number" min="0.1" step="0.1" value={formData.qty} onChange={e=>setFormData({...formData, qty: e.target.value})} className="w-full p-3.5 border border-orange-200 rounded-xl outline-none bg-white font-bold text-slate-800 focus:ring-2 focus:ring-orange-400" placeholder="0.0" /></div>
                        </div>

                        <h4 className="font-bold text-slate-800 mb-4 border-b pb-2 flex items-center gap-2"><ClipboardList className="w-5 h-5 text-blue-500"/> تفاصيل حصة الاستهلاك (للتوثيق)</h4>
                        <div className="grid grid-cols-2 md:grid-cols-3 gap-5">
                            <div><label className="block text-sm font-bold mb-2 text-slate-700">التاريخ</label><input required type="date" value={formData.date} onChange={e=>setFormData({...formData, date: e.target.value})} className="w-full p-3 border border-slate-300 rounded-xl outline-none focus:ring-2 focus:ring-blue-500" /></div>
                            <div><label className="block text-sm font-bold mb-2 text-slate-700">اليوم</label><select value={formData.day} onChange={e=>setFormData({...formData, day: e.target.value})} className="w-full p-3 border border-slate-300 rounded-xl bg-white outline-none focus:ring-2 focus:ring-blue-500"><option value="">-</option>{days.map(d=><option key={d}>{d}</option>)}</select></div>
                            <div><label className="block text-sm font-bold mb-2 text-slate-700">الحصة</label><select value={formData.period} onChange={e=>setFormData({...formData, period: e.target.value})} className="w-full p-3 border border-slate-300 rounded-xl bg-white outline-none focus:ring-2 focus:ring-blue-500"><option value="">-</option>{periods.map(p=><option key={p}>{p}</option>)}</select></div>
                            <div><label className="block text-sm font-bold mb-2 text-slate-700">الفصل</label><select required value={formData.gradeClass} onChange={e=>setFormData({...formData, gradeClass: e.target.value})} className="w-full p-3 border border-slate-300 rounded-xl bg-white outline-none focus:ring-2 focus:ring-blue-500"><option value="">-</option>{allClasses.map(c=><option key={c}>{c}</option>)}</select></div>
                            <div className="col-span-2"><label className="block text-sm font-bold mb-2 text-slate-700">المعلم المسؤول</label><select required value={formData.teacher} onChange={e=>setFormData({...formData, teacher: e.target.value})} className="w-full p-3 border border-slate-300 rounded-xl bg-white outline-none focus:ring-2 focus:ring-blue-500"><option value="">-</option>{labTeachers.map(t=><option key={t.id}>{t.name}</option>)}</select></div>
                        </div>
                        <button type="submit" className="w-full bg-orange-500 hover:bg-orange-600 text-white font-bold py-4 mt-6 rounded-xl shadow-lg transition-all text-lg flex justify-center items-center gap-2"><Activity className="w-6 h-6"/> تأكيد الاعتماد وخصم الكمية</button>
                    </form>
                </div>
            );
        }

        // --- الصلاحية والإعدام المدمج ---
        function ExpiryView({ inventory, setInventory, minutes, setMinutes, transactions, setTransactions, user, activeRole, appSettings, activeSchoolFilter }) {
            const consumableItems = inventory.filter(i => (!i.school || i.school === activeSchoolFilter) && i.lab === activeRole && i.type === 'consumable' && i.expiryDate);
            const today = new Date();
            
            const [disposeForm, setDisposeForm] = useState(null); 
            const [committee, setCommittee] = useState('');

            const submitDisposal = (e) => {
                e.preventDefault();
                if(!committee.trim()) return alert("يجب كتابة أسماء اللجنة!");
                
                // الخصم كاستهلاك (تصفير الكمية)
                const updated = inventory.map(i => i.id === disposeForm.item.id ? { ...i, quantity: 0 } : i);
                setInventory(updated);
                
                const minuteId = 'DISP-' + Math.floor(1000 + Math.random() * 9000);
                setMinutes([{ 
                    id: minuteId, type: 'محضر إعدام مواد', item: disposeForm.item.name, code: disposeForm.item.code, quantity: disposeForm.item.quantity, unit: disposeForm.item.unit, 
                    date: new Date().toISOString(), lab: activeRole, user: user.name, reason: 'انتهاء الصلاحية وتلف المادة', committee: committee, year: appSettings.currentYear, school: activeSchoolFilter 
                }, ...minutes]);
                
                // تسجيله كـ إعدام في الـ transactions
                setTransactions([{ id: Date.now(), type: 'disposal', item: disposeForm.item.name, quantity: disposeForm.item.quantity, date: new Date().toISOString(), user: user.name, lab: activeRole, year: appSettings.currentYear, details: `لجنة: ${committee}`, school: activeSchoolFilter }, ...transactions]);
                
                alert('تم إعدام المادة وتصفيرها وإنشاء المحضر بنجاح.');
                setDisposeForm(null); setCommittee('');
            };

            // فلترة: عرض المنتهي (أقل من 0) وقارب على الانتهاء (أقل من 60 يوم)
            const displayItems = [...consumableItems]
                .map(item => {
                    const diffDays = Math.ceil((new Date(item.expiryDate) - today) / (1000 * 60 * 60 * 24));
                    return { ...item, diffDays };
                })
                .filter(item => item.diffDays <= 60 && item.quantity > 0) // فقط المنتهي أو قارب، ولا يزال له رصيد
                .sort((a, b) => a.diffDays - b.diffDays);

            return (
                <div className="space-y-6 animate-in fade-in">
                    <ViewHeader title="إدارة الصلاحية وتوالف المواد" desc="تتبع المواد التي شارفت على الانتهاء وإصدار محاضر الإعدام للمنتهي" />
                    
                    {disposeForm && (
                        <div className="bg-red-50 border border-red-200 rounded-3xl p-8 shadow-md mb-8 relative animate-in">
                            <button onClick={()=>setDisposeForm(null)} className="absolute top-5 left-5 text-red-400 hover:text-red-700 bg-white rounded-full p-1"><XCircle/></button>
                            <h3 className="text-2xl font-black text-red-800 mb-2 flex items-center gap-2"><AlertTriangle className="w-8 h-8"/> إصدار محضر إعدام: {disposeForm.item.name}</h3>
                            <p className="text-sm font-bold text-red-700 mb-6 bg-red-100/50 p-3 rounded-lg border border-red-200 inline-block">الرصيد الفعلي الذي سيتم إعدامه: {disposeForm.item.quantity} {disposeForm.item.unit}</p>
                            <form onSubmit={submitDisposal}>
                                <label className="block text-sm font-bold mb-3 text-red-900">أسماء ووظائف أعضاء لجنة الإعدام (افصل بينهم بفاصلة):</label>
                                <textarea required rows="3" value={committee} onChange={e=>setCommittee(e.target.value)} placeholder="مثال: أ. أحمد (مشرف المعمل)، أ. محمد (مدير المدرسة)، أ. فهد (معلم علوم)..." className="w-full p-4 border border-red-200 rounded-xl outline-none text-sm focus:ring-2 focus:ring-red-400 bg-white font-bold leading-relaxed"></textarea>
                                <button type="submit" className="mt-6 w-full md:w-auto bg-red-600 text-white font-bold px-8 py-3.5 rounded-xl shadow-lg hover:bg-red-700 transition-colors flex items-center justify-center gap-2 text-lg"><Trash2/> اعتماد المحضر وخصم الكمية</button>
                            </form>
                        </div>
                    )}

                    <div className="bg-white border border-slate-200 rounded-3xl shadow-sm overflow-hidden">
                        <table className="w-full text-right text-sm">
                            <thead className="bg-slate-50 border-b border-slate-200">
                                <tr><th className="p-5 font-bold text-slate-600">الصنف</th><th className="p-5 font-bold text-slate-600">تاريخ الانتهاء</th><th className="p-5 font-bold text-slate-600">الرصيد</th><th className="p-5 font-bold text-slate-600">حالة الصلاحية</th><th className="p-5 text-center font-bold text-slate-600">الإجراء (للمنتهي)</th></tr>
                            </thead>
                            <tbody className="divide-y divide-slate-100">
                                {displayItems.map(item => {
                                    const isExpired = item.diffDays < 0;
                                    const statusLabel = isExpired ? 'منتهية الصلاحية' : `متبقي ${item.diffDays} يوم`;
                                    const color = isExpired ? 'text-red-700 bg-red-100 border-red-200' : 'text-orange-700 bg-orange-100 border-orange-200';
                                    
                                    return (
                                        <tr key={item.id} className="hover:bg-slate-50/50 transition-colors group">
                                            <td className="p-5 font-bold text-slate-800 text-base">{item.name} <div className="text-xs font-mono text-slate-400 mt-1">{item.code}</div></td>
                                            <td className="p-5 font-mono font-bold text-slate-600" dir="ltr">{item.expiryDate}</td>
                                            <td className="p-5 font-black text-lg text-slate-700">{item.quantity} <span className="text-xs font-normal text-slate-500">{item.unit}</span></td>
                                            <td className="p-5"><span className={`px-3 py-1.5 rounded-lg text-xs font-bold border ${color}`}>{statusLabel}</span></td>
                                            <td className="p-5 text-center">
                                                {isExpired ? (
                                                    <button onClick={() => setDisposeForm({item})} className="bg-red-50 text-red-600 border border-red-200 px-4 py-2 rounded-xl text-sm font-bold hover:bg-red-600 hover:text-white transition-all flex items-center gap-2 mx-auto shadow-sm group-hover:shadow-md">
                                                        <Trash2 className="w-4 h-4" /> إعدام وتصفير
                                                    </button>
                                                ) : <span className="text-slate-300 text-xs font-bold">لا يزال صالحاً</span>}
                                            </td>
                                        </tr>
                                    )
                                })}
                                {displayItems.length === 0 && <tr><td colSpan="5" className="p-12 text-center text-green-600 font-bold text-lg bg-green-50/30">جميع المواد في العهدة صالحة للاستخدام. لا توجد مواد منتهية أو قاربت على الانتهاء.</td></tr>}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        }

        // --- نقل العهدة ---
        function TransferView({ inventory, setInventory, transactions, setTransactions, activeRole, user, appSettings, minutes, setMinutes, activeSchoolFilter }) {
            const [selectedItemId, setSelectedItemId] = useState('');
            const [targetLab, setTargetLab] = useState('');
            const [qty, setQty] = useState('');
            const [msg, setMsg] = useState({ type: '', text: '' });

            const availableItems = inventory.filter(i => (!i.school || i.school === activeSchoolFilter) && i.lab === activeRole && i.quantity > 0);

            const handleTransfer = (e) => {
                e.preventDefault();
                const itemIndex = inventory.findIndex(i => i.id === selectedItemId);
                const sourceItem = inventory[itemIndex];
                const transferQty = parseFloat(qty);

                if (transferQty > sourceItem.quantity) return setMsg({ type: 'error', text: 'الكمية المطلوبة أكبر من المتوفرة بالمعمل!' });
                if (sourceItem.lab === targetLab) return setMsg({ type: 'error', text: 'اختر معملاً مختلفاً كوجهة للنقل!' });

                let updatedInventory = [...inventory];
                updatedInventory[itemIndex].quantity -= transferQty;

                const existingTargetItemIndex = updatedInventory.findIndex(i => i.code === sourceItem.code && i.lab === targetLab && (!i.school || i.school === activeSchoolFilter));
                if (existingTargetItemIndex > -1) updatedInventory[existingTargetItemIndex].quantity += transferQty;
                else updatedInventory.push({ ...sourceItem, id: Date.now().toString(), lab: targetLab, quantity: transferQty, school: activeSchoolFilter });

                setInventory(updatedInventory);
                setTransactions(prev => [...prev, { id: Date.now(), type: 'transfer_out', item: sourceItem.name, quantity: transferQty, date: new Date().toISOString(), user: user.name, lab: activeRole, targetLab: targetLab, year: appSettings.currentYear, school: activeSchoolFilter }]);

                const minuteId = 'TRN-' + Math.floor(1000 + Math.random() * 9000);
                setMinutes([{ id: minuteId, type: 'محضر نقل عهدة', item: sourceItem.name, code: sourceItem.code, quantity: transferQty, unit: sourceItem.unit, date: new Date().toISOString(), lab: activeRole, user: user.name, reason: `تم النقل إلى: ${labsInfo[targetLab]?.name}`, year: appSettings.currentYear, school: activeSchoolFilter }, ...minutes]);

                setMsg({ type: 'success', text: `تم النقل إلى ${labsInfo[targetLab].name} وإنشاء محضر النقل آلياً.` });
                setSelectedItemId(''); setTargetLab(''); setQty('');
                setTimeout(() => setMsg({ type: '', text: '' }), 5000);
            };

            return (
                <div className="max-w-4xl mx-auto space-y-6 animate-in fade-in">
                    <ViewHeader title="نقل العهدة بين المعامل (داخل المدرسة)" desc="تحويل الأجهزة والأدوات بين المعامل وإصدار محاضر النقل آلياً" />
                    {msg.text && <div className={`p-4 rounded-xl flex items-center gap-3 font-bold border animate-in fade-in ${msg.type === 'error' ? 'bg-red-50 text-red-700 border-red-200' : 'bg-green-50 text-green-700 border-green-200'}`}>{msg.type === 'error' ? <XCircle/> : <CheckCircle2/>} {msg.text}</div>}
                    
                    <form onSubmit={handleTransfer} className="bg-white border border-slate-200 rounded-3xl p-8 space-y-8 shadow-sm">
                        <div>
                            <label className="block text-sm font-bold text-slate-700 mb-2">اختر الصنف المراد نقله من العهدة</label>
                            <select required value={selectedItemId} onChange={e => setSelectedItemId(e.target.value)} className="w-full p-4 border border-slate-300 rounded-xl outline-none bg-slate-50 focus:bg-white focus:ring-2 focus:ring-purple-400 font-bold text-slate-800">
                                <option value="">-- القائمة --</option>
                                {availableItems.map(item => <option key={item.id} value={item.id}>{item.name} (المتاح: {item.quantity} {item.unit})</option>)}
                            </select>
                        </div>
                        
                        <div className="flex flex-col md:flex-row items-center gap-6">
                            <div className="w-full md:w-1/2">
                                <label className="block text-sm font-bold text-slate-700 mb-2">الكمية المنقولة</label>
                                <input required type="number" min="0.1" step="0.1" value={qty} onChange={e => setQty(e.target.value)} className="w-full p-4 border border-slate-300 rounded-xl outline-none focus:ring-2 focus:ring-purple-400 font-black text-xl text-center text-purple-700 bg-slate-50 focus:bg-white" placeholder="0" />
                            </div>
                            <div className="hidden md:flex justify-center mt-6 p-4 bg-purple-50 rounded-full text-purple-400">
                                <ArrowRightLeft className="w-8 h-8" />
                            </div>
                            <div className="w-full md:w-1/2">
                                <label className="block text-sm font-bold text-slate-700 mb-2">المعمل الوجهة المستلم</label>
                                <select required value={targetLab} onChange={e => setTargetLab(e.target.value)} className="w-full p-4 border border-slate-300 rounded-xl outline-none bg-slate-50 focus:bg-white focus:ring-2 focus:ring-purple-400 font-bold text-slate-800">
                                    <option value="">-- اختر الوجهة --</option>
                                    {Object.keys(labsInfo).filter(k => k !== 'admin' && k !== activeRole && k !== 'all').map(key => <option key={key} value={key}>{labsInfo[key].name}</option>)}
                                </select>
                            </div>
                        </div>
                        
                        <button type="submit" className="w-full bg-purple-600 hover:bg-purple-700 text-white font-bold py-4 rounded-xl flex justify-center items-center gap-3 shadow-lg transition-all active:scale-95 text-lg mt-4">
                            <ArrowRightLeft className="w-6 h-6" /> تأكيد العملية وإصدار محضر النقل
                        </button>
                    </form>
                </div>
            );
        }

        // --- التحضير الإلكتروني المطور ---
        function EPreparationView({ preparations, setPreparations, inventory, user, activeRole, appSettings, activeYearFilter, activeSchoolFilter }) {
            const [viewMode, setViewMode] = useState('new'); 
            const [selectedPrepId, setSelectedPrepId] = useState('');
            
            const [prepData, setPrepData] = useState({ date: '', day: days[0], period: periods[0], gradeClass: '', topic: '', materials: [], otherMaterials: '' });
            const [selectedMatId, setSelectedMatId] = useState('');
            const [selectedMatQty, setSelectedMatQty] = useState('');

            const filteredPreps = preparations.filter(p => (!p.school || p.school === activeSchoolFilter) && p.lab === activeRole && p.year === activeYearFilter);
            const activeInventory = inventory.filter(i => (!i.school || i.school === activeSchoolFilter) && i.lab === activeRole);

            const handleAddMaterial = () => {
                if(!selectedMatId || !selectedMatQty) return;
                const item = inventory.find(i=>i.id === selectedMatId);
                setPrepData({...prepData, materials: [...prepData.materials, { id: item.id, name: item.name, qty: selectedMatQty, unit: item.unit }]});
                setSelectedMatId(''); setSelectedMatQty('');
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                const newPrep = {
                    id: 'PREP-' + Date.now().toString().slice(-6),
                    createdDate: new Date().toLocaleDateString('ar-SA'),
                    teacherName: user.name, lab: activeRole, year: appSettings.currentYear, school: activeSchoolFilter, ...prepData
                };
                setPreparations([newPrep, ...preparations]);
                alert("تم حفظ الإذن الإلكتروني بنجاح في السجل.");
                setPrepData({ date: '', day: days[0], period: periods[0], gradeClass: '', topic: '', materials: [], otherMaterials: '' });
                setViewMode('view_prev');
                setSelectedPrepId(newPrep.id);
            };

            const printDocument = (mode, prepObj = null) => {
                let content = '';
                if(mode === 'manual') {
                    content = `
                        <div dir="rtl" style="font-family: Arial; padding: 40px; border: 2px solid #000; max-width: 800px; margin: auto; height: 90vh;">
                            <h1 style="text-align: center; border-bottom: 2px solid #000; padding-bottom: 20px;">نموذج إذن تحضير (يدوي)</h1>
                            <div style="margin-top: 30px; font-size: 18px; font-weight: bold; line-height: 2.5;">
                                <p>اليوم: ..................... الموافق: ..................... الحصة: .....................</p>
                                <p>الصف والفصل: .....................................................</p>
                                <p>المعلم: .....................................................</p>
                                <p>موضوع التجربة: .....................................................</p>
                                <p>المواد والأدوات المطلوبة:</p>
                                <div style="border: 2px dashed #666; height: 300px; border-radius: 10px;"></div>
                                <div style="margin-top: 80px; display: flex; justify-content: space-between; text-align: center;">
                                    <div>توقيع المعلم<br><br>......................</div>
                                    <div>توقيع المشرف<br><br>......................</div>
                                </div>
                            </div>
                        </div>
                    `;
                } else if(mode === 'electronic' && prepObj) {
                    content = `
                        <div dir="rtl" style="font-family: Arial; padding: 40px; border: 2px solid #000; max-width: 800px; margin: auto;">
                            <h1 style="text-align: center; border-bottom: 2px solid #000; padding-bottom: 20px;">إذن تحضير إلكتروني معتمد</h1>
                            <div style="margin-top: 20px; font-size: 16px; font-weight: bold; line-height: 2;">
                                <table style="width: 100%; border-collapse: collapse; margin-bottom: 20px;">
                                    <tr><td style="border: 1px solid #000; padding: 10px;">التاريخ: ${prepObj.date}</td><td style="border: 1px solid #000; padding: 10px;">اليوم: ${prepObj.day}</td></tr>
                                    <tr><td style="border: 1px solid #000; padding: 10px;">الحصة: ${prepObj.period}</td><td style="border: 1px solid #000; padding: 10px;">الفصل: ${prepObj.gradeClass}</td></tr>
                                    <tr><td style="border: 1px solid #000; padding: 10px;" colspan="2">المعلم: ${prepObj.teacherName}</td></tr>
                                    <tr><td style="border: 1px solid #000; padding: 10px;" colspan="2">الموضوع: ${prepObj.topic}</td></tr>
                                </table>
                                <h3>الأدوات المسحوبة من العهدة:</h3>
                                <ul style="border: 1px solid #000; padding: 20px 40px; min-height: 100px;">
                                    ${prepObj.materials.map(m => `<li>${m.name} - الكمية: ${m.qty} ${m.unit}</li>`).join('')}
                                </ul>
                                <h3>مواد أخرى:</h3>
                                <p style="border: 1px solid #000; padding: 20px; min-height: 60px;">${prepObj.otherMaterials || 'لا يوجد'}</p>
                            </div>
                            <div style="margin-top: 80px; display: flex; justify-content: space-between; text-align: center; font-weight: bold;">
                                <div>توقيع المعلم<br><br>......................</div>
                                <div>اعتماد المشرف<br><br>......................</div>
                            </div>
                            <p style="text-align:center; font-size:12px; margin-top:30px; color:#555;">رقم المرجع: ${prepObj.id} | المدرسة: ${prepObj.school || 'عام'} | أُنشئ في: ${prepObj.createdDate}</p>
                        </div>
                    `;
                }
                const win = window.open('', '', 'width=900,height=600');
                win.document.write(`<html><head><title>طباعة إذن</title></head><body onload="window.print(); window.close();">${content}</body></html>`);
                win.document.close();
            };

            const selectedPrepData = filteredPreps.find(p => p.id === selectedPrepId);

            return (
                <div className="space-y-6 animate-in fade-in">
                    <ViewHeader title="نظام التحضير الإلكتروني" desc="إنشاء وتوثيق أذونات تجهيز المعمل وإصدار النماذج" />
                    
                    {/* القائمة العلوية للخيارات */}
                    <div className="flex bg-slate-100 p-1.5 rounded-2xl gap-2 print:hidden w-fit shadow-inner">
                        <button onClick={()=>setViewMode('new')} className={`px-5 py-2.5 text-sm font-bold rounded-xl flex items-center gap-2 transition-all ${viewMode==='new'?'bg-white shadow text-blue-700':'text-slate-600 hover:bg-slate-200'}`}><PlusCircle className="w-4 h-4"/> إذن إلكتروني جديد</button>
                        <button onClick={()=>setViewMode('view_prev')} className={`px-5 py-2.5 text-sm font-bold rounded-xl flex items-center gap-2 transition-all ${viewMode==='view_prev'?'bg-white shadow text-blue-700':'text-slate-600 hover:bg-slate-200'}`}><FileDown className="w-4 h-4"/> معاينة الأذونات السابقة</button>
                        <div className="w-px bg-slate-300 mx-1 my-2"></div>
                        <button onClick={()=>setViewMode('manual')} className={`px-5 py-2.5 text-sm font-bold rounded-xl flex items-center gap-2 transition-all ${viewMode==='manual'?'bg-white shadow text-slate-800':'text-slate-600 hover:bg-slate-200'}`}><FileText className="w-4 h-4"/> طباعة إذن تفريغ يدوي</button>
                    </div>

                    {viewMode === 'new' && (
                        <form onSubmit={handleSubmit} className="bg-white border border-slate-200 rounded-3xl p-8 shadow-sm space-y-8 animate-in fade-in">
                            <div className="grid grid-cols-2 md:grid-cols-4 gap-5">
                                <div><label className="block text-sm font-bold mb-2 text-slate-700">التاريخ</label><input required type="date" value={prepData.date} onChange={e=>setPrepData({...prepData, date: e.target.value})} className="w-full p-3 border border-slate-300 rounded-xl outline-none focus:ring-2 focus:ring-blue-500" /></div>
                                <div><label className="block text-sm font-bold mb-2 text-slate-700">اليوم</label><select value={prepData.day} onChange={e=>setPrepData({...prepData, day: e.target.value})} className="w-full p-3 border border-slate-300 rounded-xl bg-white font-bold outline-none focus:ring-2 focus:ring-blue-500">{days.map(d=><option key={d}>{d}</option>)}</select></div>
                                <div><label className="block text-sm font-bold mb-2 text-slate-700">الحصة</label><select value={prepData.period} onChange={e=>setPrepData({...prepData, period: e.target.value})} className="w-full p-3 border border-slate-300 rounded-xl bg-white font-bold outline-none focus:ring-2 focus:ring-blue-500">{periods.map(p=><option key={p}>{p}</option>)}</select></div>
                                <div>
                                    <label className="block text-sm font-bold mb-2 text-slate-700">الصف والفصل</label>
                                    <select required value={prepData.gradeClass} onChange={e=>setPrepData({...prepData, gradeClass: e.target.value})} className="w-full p-3 border border-slate-300 rounded-xl bg-white font-bold outline-none focus:ring-2 focus:ring-blue-500">
                                        <option value="">-- اختر --</option>
                                        {appSettings.grades.map(g => appSettings.classes.map(c => <option key={g+c} value={`${g} - ${c}`}>{g} / {c}</option>))}
                                    </select>
                                </div>
                                <div className="col-span-2 md:col-span-4"><label className="block text-sm font-bold mb-2 text-slate-700">موضوع التجربة / الدرس</label><input required type="text" value={prepData.topic} onChange={e=>setPrepData({...prepData, topic: e.target.value})} className="w-full p-4 border border-slate-300 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 font-bold text-lg" placeholder="اكتب الموضوع هنا..." /></div>
                            </div>
                            
                            <div className="border-t border-slate-200 pt-6">
                                <h4 className="font-bold text-blue-800 mb-4 flex items-center gap-2"><Database className="w-5 h-5"/> اختيار المواد من جرد العهدة</h4>
                                <div className="flex flex-col md:flex-row gap-3 items-end bg-blue-50 p-4 rounded-2xl border border-blue-100">
                                    <div className="flex-1 w-full"><label className="block text-xs font-bold mb-1 text-blue-900">المادة</label><select value={selectedMatId} onChange={e=>setSelectedMatId(e.target.value)} className="w-full p-3 border border-blue-200 rounded-xl bg-white font-bold outline-none focus:ring-2 focus:ring-blue-400"><option value="">-- قائمة أدوات المعمل الفعالة --</option>{activeInventory.map(i => <option key={i.id} value={i.id}>{i.name} (المتاح: {i.quantity} {i.unit})</option>)}</select></div>
                                    <div className="w-full md:w-32"><label className="block text-xs font-bold mb-1 text-blue-900">الكمية</label><input type="number" min="0.1" step="0.1" value={selectedMatQty} onChange={e=>setSelectedMatQty(e.target.value)} className="w-full p-3 border border-blue-200 rounded-xl text-center font-bold outline-none focus:ring-2 focus:ring-blue-400 bg-white" placeholder="0.0" /></div>
                                    <button type="button" onClick={handleAddMaterial} className="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-xl shadow transition-colors w-full md:w-auto h-[46px] flex items-center justify-center">إضافة للقائمة</button>
                                </div>
                                {prepData.materials.length > 0 && (
                                    <ul className="mt-4 grid grid-cols-1 md:grid-cols-2 gap-3">
                                        {prepData.materials.map((m, idx) => (
                                            <li key={idx} className="bg-white border border-blue-200 p-3 rounded-xl text-sm font-bold flex justify-between items-center shadow-sm">
                                                <span className="text-slate-800">{m.name}</span><span className="bg-blue-100 text-blue-800 px-3 py-1 rounded-lg">{m.qty} {m.unit}</span>
                                            </li>
                                        ))}
                                    </ul>
                                )}
                            </div>
                            <div className="border-t border-slate-200 pt-6">
                                <label className="block text-sm font-bold mb-2 text-slate-700">مواد وأدوات أخرى متفرقة (خارج العهدة - إن وجد)</label>
                                <textarea rows="3" value={prepData.otherMaterials} onChange={e=>setPrepData({...prepData, otherMaterials: e.target.value})} className="w-full p-4 border border-slate-300 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 bg-slate-50 focus:bg-white transition-colors" placeholder="ورق، مقصات، صلصال..."></textarea>
                            </div>
                            <button type="submit" className="w-full bg-slate-800 text-white font-bold py-4 rounded-xl shadow-lg hover:bg-slate-700 transition-all text-lg mt-4 flex justify-center items-center gap-2"><Save className="w-5 h-5"/> حفظ وإصدار الإذن الإلكتروني</button>
                        </form>
                    )}

                    {viewMode === 'manual' && (
                        <div className="bg-white border border-slate-200 rounded-3xl p-12 shadow-sm text-center animate-in fade-in zoom-in-95 duration-500">
                            <div className="bg-slate-50 w-24 h-24 rounded-full flex items-center justify-center mx-auto mb-6 border border-slate-200">
                                <FileText className="w-12 h-12 text-slate-400" />
                            </div>
                            <h3 className="text-2xl font-black mb-3 text-slate-800">طباعة نموذج تفريغ ورقي</h3>
                            <p className="text-slate-500 mb-8 max-w-md mx-auto leading-relaxed">استخدم هذا الخيار إذا كنت ترغب في طباعة نموذج فارغ ليتم تعبئته وتوقيعه يدوياً خارج النظام الإلكتروني.</p>
                            <button onClick={() => printDocument('manual')} className="bg-slate-800 text-white font-bold px-10 py-4 rounded-2xl shadow-lg hover:shadow-slate-500/30 flex items-center gap-3 mx-auto transition-all active:scale-95 text-lg"><Printer className="w-6 h-6"/> طباعة النموذج / حفظ PDF</button>
                        </div>
                    )}

                    {viewMode === 'view_prev' && (
                        <div className="bg-white border border-slate-200 rounded-3xl p-8 shadow-sm animate-in fade-in min-h-[500px]">
                            <div className="bg-slate-50 border border-slate-200 p-5 rounded-2xl mb-8 flex flex-col md:flex-row items-center gap-4">
                                <label className="block text-sm font-bold text-slate-700 whitespace-nowrap">ابحث واختر الإذن للمعاينة:</label>
                                <select value={selectedPrepId} onChange={e=>setSelectedPrepId(e.target.value)} className="w-full p-3.5 border border-slate-300 rounded-xl bg-white font-bold outline-none focus:ring-2 focus:ring-blue-500 cursor-pointer">
                                    <option value="">-- تصفح سجل الأذونات المعتمدة --</option>
                                    {filteredPreps.map(p => <option key={p.id} value={p.id}>{p.date} | الحصة {p.period} | فصل {p.gradeClass} | الدرس: {p.topic}</option>)}
                                </select>
                            </div>

                            {selectedPrepData ? (
                                <div className="border border-slate-300 p-10 rounded-3xl max-w-3xl mx-auto bg-white shadow-lg relative overflow-hidden animate-in slide-in-from-bottom-4 duration-500">
                                    {/* شريط زينة علوي */}
                                    <div className="absolute top-0 left-0 w-full h-2 bg-blue-600"></div>
                                    
                                    <div className="flex justify-between items-start mb-8 border-b border-slate-200 pb-6">
                                        <div>
                                            <h3 className="text-2xl font-black text-slate-800 mb-2">{selectedPrepData.topic}</h3>
                                            <div className="text-xs font-mono text-slate-400 bg-slate-100 px-2 py-1 rounded inline-block">مرجع: {selectedPrepData.id}</div>
                                        </div>
                                        <button onClick={() => printDocument('electronic', selectedPrepData)} className="bg-blue-50 text-blue-700 hover:bg-blue-600 hover:text-white border border-blue-200 font-bold px-5 py-2.5 rounded-xl flex items-center gap-2 transition-colors"><Printer className="w-4 h-4"/> استخراج</button>
                                    </div>
                                    
                                    <div className="grid grid-cols-2 gap-y-6 font-bold text-slate-700 text-sm mb-8 bg-slate-50 p-6 rounded-2xl border border-slate-100">
                                        <div className="flex flex-col gap-1"><span className="text-slate-400 text-xs">التاريخ واليوم</span><span className="text-base">{selectedPrepData.date} ({selectedPrepData.day})</span></div>
                                        <div className="flex flex-col gap-1"><span className="text-slate-400 text-xs">الحصة والفصل</span><span className="text-base text-blue-800 bg-blue-100/50 w-max px-2 rounded">{selectedPrepData.period} | {selectedPrepData.gradeClass}</span></div>
                                        <div className="col-span-2 flex flex-col gap-1"><span className="text-slate-400 text-xs">المعلم المنفذ</span><span className="text-base text-slate-900">{selectedPrepData.teacherName}</span></div>
                                    </div>
                                    
                                    <div className="mb-6">
                                        <h4 className="font-bold text-slate-800 mb-4 border-b border-slate-100 pb-2">الأدوات المستهلكة من العهدة:</h4>
                                        <ul className="grid grid-cols-1 md:grid-cols-2 gap-3">
                                            {selectedPrepData.materials.map((m,i)=><li key={i} className="flex justify-between border-b border-slate-100 pb-2 text-sm"><span className="font-bold text-slate-700">{m.name}</span><span className="text-slate-500 font-mono" dir="ltr">{m.qty} {m.unit}</span></li>)}
                                            {selectedPrepData.materials.length === 0 && <span className="text-slate-400 text-sm">لم يتم سحب أدوات</span>}
                                        </ul>
                                    </div>
                                    
                                    {selectedPrepData.otherMaterials && (
                                        <div className="mb-6">
                                            <h4 className="font-bold text-slate-800 mb-2 border-b border-slate-100 pb-2">مواد أخرى إضافية:</h4>
                                            <p className="text-sm text-slate-600 bg-slate-50 p-4 rounded-xl leading-relaxed">{selectedPrepData.otherMaterials}</p>
                                        </div>
                                    )}
                                    
                                    <div className="text-xs font-bold text-slate-400 text-center mt-12 bg-slate-50 py-2 rounded-lg">أُنشئ وصُدّق إلكترونياً بتاريخ: {selectedPrepData.createdDate}</div>
                                </div>
                            ) : (
                                <div className="text-center mt-16 flex flex-col items-center">
                                    <ClipboardList className="w-16 h-16 text-slate-200 mb-4"/>
                                    <p className="text-slate-400 font-bold text-lg">الرجاء اختيار إذن من القائمة المنسدلة أعلاه لعرض التفاصيل واستخراجه.</p>
                                </div>
                            )}
                        </div>
                    )}
                </div>
            );
        }

        // --- الجدول المدرسي ---
        function ScheduleView({ activeRole, schedules, setSchedules, users, appSettings, user, activeSchoolFilter }) {
            const [isEditing, setIsEditing] = useState(false);
            
            // تخصيص الجدول للمدرسة المحددة والمعمل المحدد
            const scheduleKey = `${activeSchoolFilter}_${activeRole}`;
            const defaultEmpty = days.reduce((dAcc, day) => { dAcc[day] = periods.reduce((pAcc, p) => ({...pAcc, [p]: {class: '', teacher: ''}}), {}); return dAcc; }, {});
            // توافقية للإصدار القديم أو الجديد
            const mySchedule = schedules[scheduleKey] || schedules[activeRole] || defaultEmpty;
            
            const labTeachers = users.filter(u => (u.role === activeRole || u.role === 'all') && ['teacher', 'coordinator', 'supervisor'].includes(u.type) && (u.schools?.includes('الجميع') || u.schools?.includes(activeSchoolFilter) || !u.schools?.length));
            const allClasses = appSettings.grades.flatMap(g => appSettings.classes.map(c => `${g} / ${c}`));
            const canEdit = user.type === 'admin' || user.type === 'supervisor' || user.type === 'coordinator';

            const handleCellChange = (day, period, field, value) => {
                const updated = {...schedules};
                if (!updated[scheduleKey]) {
                    updated[scheduleKey] = JSON.parse(JSON.stringify(defaultEmpty)); 
                }
                updated[scheduleKey][day][period][field] = value;
                setSchedules(updated);
            };

            return (
                <div className="space-y-6 animate-in fade-in">
                    <ViewHeader title={`الجدول المدرسي - ${labsInfo[activeRole]?.name}`} desc={`تسكين ومتابعة حصص المعمل لمدرسة (${activeSchoolFilter})`} />
                    
                    {canEdit && (
                        <div className="flex gap-2 mb-4 print:hidden bg-slate-50 p-2 rounded-xl w-fit border border-slate-200">
                            <button onClick={() => setIsEditing(!isEditing)} className={`px-6 py-2.5 rounded-lg font-bold flex items-center gap-2 transition-all ${isEditing ? 'bg-green-600 text-white shadow-md' : 'bg-white text-blue-700 border border-slate-200 hover:bg-blue-50'}`}>
                                {isEditing ? <><Save className="w-4 h-4"/> حفظ التعديلات</> : <><Edit className="w-4 h-4"/> تفعيل وضع التعديل والتسكين</>}
                            </button>
                        </div>
                    )}

                    <div className="overflow-x-auto bg-white border border-slate-200 rounded-3xl shadow-sm print:border-none print:shadow-none">
                        <table className="w-full text-center border-collapse">
                            <thead>
                                <tr className="bg-slate-100 text-slate-800 border-b-2 border-slate-200">
                                    <th className="p-4 border-l border-slate-200 w-32 font-black">اليوم / الحصة</th>{periods.map(p => <th className="p-4 border-l border-slate-200 text-sm font-black" key={p}>{p}</th>)}
                                </tr>
                            </thead>
                            <tbody>
                                {days.map(day => (
                                    <tr key={day} className="border-b border-slate-200 hover:bg-slate-50/50 transition-colors">
                                        <td className="p-4 font-black bg-slate-50/80 border-l border-slate-200 text-slate-700">{day}</td>
                                        {periods.map(period => {
                                            const cell = mySchedule[day][period];
                                            return (
                                                <td key={period} className="border-l border-slate-200 p-2 align-top h-24 min-w-[140px]">
                                                    {isEditing ? (
                                                        <div className="space-y-2 h-full flex flex-col justify-center animate-in fade-in">
                                                            <select value={cell.class} onChange={e=>handleCellChange(day, period, 'class', e.target.value)} className="w-full text-xs p-1.5 border border-blue-200 rounded-lg bg-blue-50 font-bold text-blue-900 outline-none focus:ring-1 focus:ring-blue-400"><option value="">- حدد الفصل -</option>{allClasses.map(c => <option key={c}>{c}</option>)}</select>
                                                            <select value={cell.teacher} onChange={e=>handleCellChange(day, period, 'teacher', e.target.value)} className="w-full text-xs p-1.5 border border-slate-300 rounded-lg bg-white font-bold text-slate-700 outline-none focus:ring-1 focus:ring-blue-400"><option value="">- حدد المعلم -</option>{labTeachers.map(t => <option key={t.id}>{t.name}</option>)}</select>
                                                        </div>
                                                    ) : (
                                                        <div className="flex flex-col h-full justify-center text-xs font-bold leading-relaxed">
                                                            {cell.class ? (
                                                                <div className="flex flex-col gap-1.5 animate-in zoom-in-95">
                                                                    <span className="text-blue-900 bg-blue-100 py-1 px-2 rounded-md border border-blue-200 shadow-sm block w-max mx-auto">{cell.class}</span>
                                                                    <span className="text-slate-700 line-clamp-2 leading-tight">{cell.teacher}</span>
                                                                </div>
                                                            ) : <span className="text-slate-200 text-xl font-light">-</span>}
                                                        </div>
                                                    )}
                                                </td>
                                            )
                                        })}
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        }

        // --- أرشيف المحاضر ---
        function MinutesView({ minutes, activeRole, activeYearFilter, activeSchoolFilter }) {
            const visibleMinutes = (activeRole === 'admin' || activeRole === 'minutes_global' ? minutes : minutes.filter(m => m.lab === activeRole)).filter(m => m.year === activeYearFilter && (!m.school || m.school === activeSchoolFilter));
            
            const handlePrintMinute = (minute) => {
                let committeeHtml = '';
                if(minute.committee) {
                    const members = minute.committee.split(',');
                    committeeHtml = `<h3>أعضاء اللجنة:</h3><ol style="line-height:2.5;">${members.map(m=>`<li>${m.trim()} (التوقيع: .....................)</li>`).join('')}</ol>`;
                }
                const printContent = `
                    <div dir="rtl" style="font-family: Arial; padding: 40px; border: 2px solid #000; max-width: 800px; margin: auto;">
                        <h1 style="text-align: center; border-bottom: 2px solid #000; padding-bottom: 20px;">${minute.type}</h1>
                        <div style="margin-top: 30px; font-size: 16px; line-height: 2;">
                            <p><strong>رقم المحضر:</strong> ${minute.id} &nbsp;&nbsp;|&nbsp;&nbsp; <strong>المدرسة:</strong> ${minute.school || 'عام'}</p>
                            <p><strong>التاريخ:</strong> ${new Date(minute.date).toLocaleDateString('ar-SA')} &nbsp;&nbsp;|&nbsp;&nbsp; <strong>العام:</strong> ${minute.year}</p>
                            <p><strong>المعمل:</strong> ${labsInfo[minute.lab]?.name || minute.lab}</p>
                            <p><strong>المنشئ/المسؤول:</strong> ${minute.user}</p>
                            <hr style="margin: 20px 0;">
                            <h3>بيانات المادة أو الجهاز:</h3>
                            <table style="width: 100%; border-collapse: collapse; margin-bottom: 20px;">
                                <tr><td style="border: 1px solid #000; padding: 8px; font-weight:bold;">الصنف:</td><td style="border: 1px solid #000; padding: 8px;">${minute.item}</td></tr>
                                <tr><td style="border: 1px solid #000; padding: 8px; font-weight:bold;">الكود:</td><td style="border: 1px solid #000; padding: 8px;">${minute.code}</td></tr>
                                <tr><td style="border: 1px solid #000; padding: 8px; font-weight:bold;">الكمية:</td><td style="border: 1px solid #000; padding: 8px;">${minute.quantity} ${minute.unit}</td></tr>
                            </table>
                            <h3>السبب/التفاصيل:</h3>
                            <p style="border: 1px solid #000; padding: 15px; min-height:60px; white-space: pre-wrap;">${minute.reason}</p>
                            ${committeeHtml}
                        </div>
                        <div style="margin-top: 100px; display: flex; justify-content: space-between; text-align: center; font-weight: bold;">
                            <div>محضر المعمل/المشرف<br><br>......................</div>
                            <div>مدير المدرسة (الاعتماد)<br><br>......................</div>
                        </div>
                    </div>
                `;
                const win = window.open('', '', 'width=900,height=600');
                win.document.write(`<html><head><title>طباعة محضر</title></head><body onload="window.print(); window.close();">${printContent}</body></html>`);
                win.document.close();
            };

            return (
                <div className="space-y-6 animate-in fade-in">
                    <ViewHeader title="سجل المحاضر الرسمية" desc="تتبع وطباعة كافة محاضر الفقد، الكسر، الإعدام، ونقل العهدة" />
                    <div className="bg-white border border-slate-200 rounded-3xl overflow-hidden shadow-sm">
                        <table className="w-full text-right text-sm">
                            <thead className="bg-slate-50 border-b border-slate-200"><tr><th className="p-5 font-bold text-slate-600">رقم وتاريخ</th><th className="p-5 font-bold text-slate-600">النوع</th><th className="p-5 font-bold text-slate-600">المادة والكمية</th><th className="p-5 font-bold text-slate-600">المعمل</th><th className="p-5 text-center font-bold text-slate-600">إجراء</th></tr></thead>
                            <tbody className="divide-y divide-slate-100">
                                {visibleMinutes.map(m => (
                                    <tr key={m.id} className="hover:bg-slate-50/50 transition-colors">
                                        <td className="p-5"><div className="font-mono font-bold text-slate-800 bg-slate-100 w-max px-2 py-0.5 rounded border border-slate-200">{m.id}</div><div className="text-xs text-slate-500 mt-1" dir="ltr">{new Date(m.date).toLocaleDateString()}</div></td>
                                        <td className="p-5 font-bold text-red-600">{m.type}</td>
                                        <td className="p-5"><div className="font-bold text-slate-800 text-base">{m.item}</div><div className="text-xs font-bold text-slate-500 mt-1">الكمية المسجلة: {m.quantity}</div></td>
                                        <td className="p-5 font-bold text-slate-600">{labsInfo[m.lab]?.name || m.lab}</td>
                                        <td className="p-5 text-center"><button onClick={() => handlePrintMinute(m)} className="bg-slate-800 text-white px-4 py-2.5 rounded-xl text-xs font-bold flex items-center gap-2 mx-auto hover:bg-slate-700 shadow-sm transition-all active:scale-95"><Printer className="w-4 h-4"/> طباعة المحضر</button></td>
                                    </tr>
                                ))}
                                {visibleMinutes.length === 0 && <tr><td colSpan="5" className="p-12 text-center text-slate-400 font-bold text-lg">لا توجد محاضر لهذه المدرسة للعام المختار في هذا السجل</td></tr>}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        }

        // --- التقارير والطباعة ---
        function ReportsView({ inventory, transactions, activeRole, activeYearFilter, activeSchoolFilter }) {
            const [reportType, setReportType] = useState('inventory');
            
            const schoolTransactions = transactions.filter(t => (!t.school || t.school === activeSchoolFilter) && t.lab === activeRole);
            const schoolInventory = inventory.filter(i => (!i.school || i.school === activeSchoolFilter) && i.lab === activeRole);

            const getLifetimeConsumed = (itemName) => {
                return schoolTransactions.filter(t => ['consumption', 'disposal', 'breakage', 'loss', 'transfer_out'].includes(t.type) && t.item === itemName).reduce((sum, t) => sum + t.quantity, 0);
            };

            return (
                <div className="space-y-6 animate-in fade-in">
                    <ViewHeader title="التقارير الشاملة واستخراج البيانات" desc="إصدار تقارير الجرد، وسجل الاستهلاك، وطباعة الملصقات الباركود" />
                    
                    <div className="flex bg-slate-100 p-1.5 rounded-2xl gap-2 print:hidden w-fit shadow-inner mb-6">
                        <button onClick={() => setReportType('inventory')} className={`px-5 py-3 rounded-xl font-bold text-sm transition-all ${reportType === 'inventory' ? 'bg-white shadow text-blue-700' : 'text-slate-600 hover:bg-slate-200'}`}>تقرير العهدة الختامي</button>
                        <button onClick={() => setReportType('consumption')} className={`px-5 py-3 rounded-xl font-bold text-sm transition-all ${reportType === 'consumption' ? 'bg-white shadow text-orange-600' : 'text-slate-600 hover:bg-slate-200'}`}>سجل حركات الاستهلاك التفصيلي</button>
                        <button onClick={() => setReportType('codes')} className={`px-5 py-3 rounded-xl font-bold text-sm transition-all ${reportType === 'codes' ? 'bg-white shadow text-purple-600' : 'text-slate-600 hover:bg-slate-200'}`}>دليل الأكواد والملصقات</button>
                    </div>

                    <div className="bg-white rounded-3xl print:m-0 p-8 border border-slate-200 print:border-none print:p-0 shadow-sm">
                        <div className="text-center mb-8 hidden print:block border-b-2 border-slate-800 pb-6">
                            <h1 className="text-3xl font-black text-slate-900">{reportType === 'inventory' ? 'تقرير عهدة ومخزون المعمل' : reportType === 'consumption' ? 'سجل حركات الاستهلاك' : 'دليل الأكواد والباركود'}</h1>
                            <p className="font-bold text-slate-700 mt-2 text-lg">المدرسة: {activeSchoolFilter} &nbsp;|&nbsp; المعمل: {labsInfo[activeRole]?.name} &nbsp;|&nbsp; العام الدراسي: {activeYearFilter}</p>
                        </div>

                        {reportType === 'inventory' && (
                            <table className="w-full text-right border-collapse text-sm">
                                <thead>
                                    <tr className="bg-slate-100 border-y-2 border-slate-800 text-slate-800">
                                        <th className="p-3 border-x border-slate-300 font-bold w-12 text-center">م</th><th className="p-3 border-x border-slate-300 font-bold">اسم الصنف</th><th className="p-3 border-x border-slate-300 font-bold">النوع</th>
                                        <th className="p-3 border-x border-slate-300 bg-blue-100 font-bold text-center">الكمية الموردة</th><th className="p-3 border-x border-slate-300 bg-orange-100 font-bold text-center">مستهلك/منصرف</th><th className="p-3 border-x border-slate-300 bg-green-100 font-bold text-center">الباقي بالعهدة</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {schoolInventory.map((item, idx) => {
                                        const consumed = getLifetimeConsumed(item.name);
                                        const supplied = item.quantity + consumed;
                                        return (
                                            <tr key={item.id} className="border-b border-slate-300 hover:bg-slate-50 transition-colors">
                                                <td className="p-3 border-x border-slate-300 text-center font-bold text-slate-600">{idx + 1}</td>
                                                <td className="p-3 border-x border-slate-300 font-bold text-slate-900">{item.name} <span className="font-mono text-xs text-slate-400 bg-slate-100 px-1 rounded ml-1" dir="ltr">{item.code}</span></td>
                                                <td className="p-3 border-x border-slate-300 text-xs font-bold text-slate-600">{item.type === 'permanent' ? 'مستديم' : 'مستهلك'}</td>
                                                <td className="p-3 border-x border-slate-300 text-center font-bold text-blue-800 bg-blue-50/30 text-lg">{supplied}</td>
                                                <td className="p-3 border-x border-slate-300 text-center font-bold text-orange-700 bg-orange-50/30 text-lg">{consumed === 0 ? '-' : consumed}</td>
                                                <td className="p-3 border-x border-slate-300 text-center font-black text-green-700 bg-green-50/30 text-lg">{item.quantity} <span className="font-normal text-[10px] text-slate-500">{item.unit}</span></td>
                                            </tr>
                                        )
                                    })}
                                </tbody>
                            </table>
                        )}

                        {reportType === 'consumption' && (
                            <table className="w-full text-right border-collapse text-sm">
                                <thead>
                                    <tr className="bg-slate-100 border-y-2 border-slate-800 text-slate-800">
                                        <th className="border-x border-slate-300 p-3 font-bold w-24 text-center">التاريخ</th><th className="border-x border-slate-300 p-3 font-bold">نوع الحركة</th><th className="border-x border-slate-300 p-3 font-bold">الصنف</th><th className="border-x border-slate-300 p-3 font-bold text-center w-16">الكمية</th><th className="border-x border-slate-300 p-3 font-bold">ملاحظات / المعلم المنفذ</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {schoolTransactions.filter(t => t.type !== 'supply' && t.year === activeYearFilter).map(tx => (
                                        <tr key={tx.id} className="border-b border-slate-300 hover:bg-slate-50 transition-colors">
                                            <td className="border-x border-slate-300 p-3 font-mono text-center text-slate-600" dir="ltr">{new Date(tx.date).toLocaleDateString('ar-SA')}</td>
                                            <td className="border-x border-slate-300 p-3 font-bold text-orange-700">{tx.type === 'consumption' ? 'استهلاك' : tx.type === 'transfer_out' ? 'نقل عهدة' : tx.type === 'breakage' ? 'كسر/تالف' : tx.type === 'loss' ? 'فقدان' : 'إعدام'}</td>
                                            <td className="border-x border-slate-300 p-3 font-bold text-slate-900">{tx.item}</td>
                                            <td className="border-x border-slate-300 p-3 font-black text-center text-lg text-slate-800">{tx.quantity}</td>
                                            <td className="border-x border-slate-300 p-3 text-xs font-bold text-slate-600 leading-relaxed">{tx.details || tx.user}</td>
                                        </tr>
                                    ))}
                                    {schoolTransactions.filter(t => t.type !== 'supply' && t.year === activeYearFilter).length === 0 && <tr><td colSpan="5" className="p-8 text-center text-slate-400 font-bold">لا توجد حركات استهلاك مسجلة لهذا العام.</td></tr>}
                                </tbody>
                            </table>
                        )}

                        {reportType === 'codes' && (
                            <div>
                                <div className="mb-6 text-sm font-bold text-blue-800 print:hidden text-center bg-blue-50 p-4 rounded-xl border border-blue-200">
                                    للطباعة كملصقات (ستيكرات قابلة للقص): تأكد من ضبط إعدادات الطابعة على (A4) وإزالة الهوامش (Margins: None).
                                </div>
                                <div className="grid grid-cols-2 md:grid-cols-3 gap-4 print:gap-[2mm] print:grid-cols-3 w-full">
                                    {schoolInventory.map(item => (
                                        <div key={`sticker-${item.id}`} className="border-2 border-slate-800 p-3 rounded-2xl text-center break-inside-avoid flex flex-col items-center justify-center bg-white shadow-sm" style={{ height: '3.8cm' }}>
                                            <h4 className="font-bold text-slate-900 text-xs leading-tight mb-1 truncate w-full">{item.name}</h4><p className="text-[10px] font-bold text-slate-500 mb-1">{labsInfo[item.lab]?.name}</p>
                                            <svg width="110" height="35" xmlns="http://www.w3.org/2000/svg" className="my-1"><rect width="110" height="35" fill="white"/><path d="M10 0h2v35h-2zm4 0h4v35h-4zm6 0h2v35h-2zm4 0h1v35h-1zm3 0h5v35h-5zm7 0h2v35h-2zm4 0h3v35h-3zm5 0h2v35h-2zm4 0h1v35h-1zm3 0h4v35h-4zm6 0h2v35h-2zm5 0h3v35h-3zm5 0h1v35h-1zm3 0h4v35h-4zm6 0h2v35h-2zm4 0h1v35h-1zm3 0h5v35h-5z" fill="black"/></svg>
                                            <div className="flex justify-between items-center w-full px-2 mt-2"><span className="font-mono text-[11px] tracking-widest font-black text-slate-800">{item.barcode}</span><span className="text-[10px] font-bold bg-slate-200 px-2 py-0.5 rounded border border-slate-300">{item.code}</span></div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
