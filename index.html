<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام إدارة المعامل ERP</title>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Custom Styles -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap');
        
        body {
            font-family: 'Tajawal', system-ui, -apple-system, sans-serif;
            background-color: #ffffff; /* تم التأكيد على الخلفية البيضاء بناءً على تفضيلاتك */
        }
        
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f5f9; 
            border-radius: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; 
        }

        @media print {
            .print\:hidden { display: none !important; }
            .print\:block { display: block !important; }
            .print\:m-0 { margin: 0 !important; }
            .print\:p-0 { padding: 0 !important; }
            .print\:border-none { border: none !important; }
            .print\:shadow-none { box-shadow: none !important; }
            body { background-color: white !important; }
        }
        
        /* Simple fade-in animation class */
        .animate-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- Firebase SDK Modules - تم تصحيح الإصدار إلى 11.6.1 ليعمل بنجاح -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, doc, getDoc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        
        // تم التعديل: نستخدم إعدادات البيئة الافتراضية هنا لتنجح عملية الحفظ فوراً، ونبقي إعداداتك كبديل
        let firebaseConfig;
        if (typeof __firebase_config !== 'undefined') {
            firebaseConfig = JSON.parse(__firebase_config);
        } else {
            firebaseConfig = {
                apiKey: "AIzaSyAPcPQoAle1eawBZ_rZSjBheG31E5A1nts",
                authDomain: "bls-lab-97d96.firebaseapp.com",
                databaseURL: "https://bls-lab-97d96-default-rtdb.firebaseio.com",
                projectId: "bls-lab-97d96",
                storageBucket: "bls-lab-97d96.firebasestorage.app",
                messagingSenderId: "95190305424",
                appId: "1:95190305424:web:c305cafa6607f3d434a615"
            };
        }

        // تهيئة Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        
        // Use injected App ID or fallback
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'bls-lab-v1';

        // Export to global scope for React to use
        window.firebaseDB = db;
        window.firebaseAuth = auth;
        window.firebaseModules = { collection, doc, getDoc, setDoc, onSnapshot, signInAnonymously, onAuthStateChanged, signInWithCustomToken };
        window.appId = appId;
    </script>

    <!-- React Application Code -->
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Mock Icons
        const Icon = ({ name, className }) => {
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            });
            return <i data-lucide={name} className={className}></i>;
        };

        const FlaskConical = (p) => <Icon name="flask-conical" {...p} />;
        const Microscope = (p) => <Icon name="microscope" {...p} />;
        const Atom = (p) => <Icon name="atom" {...p} />;
        const Activity = (p) => <Icon name="activity" {...p} />;
        const ShieldCheck = (p) => <Icon name="shield-check" {...p} />;
        const LogOut = (p) => <Icon name="log-out" {...p} />;
        const PackagePlus = (p) => <Icon name="package-plus" {...p} />;
        const Database = (p) => <Icon name="database" {...p} />;
        const AlertTriangle = (p) => <Icon name="alert-triangle" {...p} />;
        const ArrowRightLeft = (p) => <Icon name="arrow-right-left" {...p} />;
        const ClipboardList = (p) => <Icon name="clipboard-list" {...p} />;
        const CalendarDays = (p) => <Icon name="calendar-days" {...p} />;
        const Printer = (p) => <Icon name="printer" {...p} />;
        const Search = (p) => <Icon name="search" {...p} />;
        const PlusCircle = (p) => <Icon name="plus-circle" {...p} />;
        const CheckCircle2 = (p) => <Icon name="check-circle-2" {...p} />;
        const XCircle = (p) => <Icon name="x-circle" {...p} />;
        const Barcode = (p) => <Icon name="barcode" {...p} />;
        const Users = (p) => <Icon name="users" {...p} />;
        const Download = (p) => <Icon name="download" {...p} />;
        const Upload = (p) => <Icon name="upload" {...p} />;
        const FileSpreadsheet = (p) => <Icon name="file-spreadsheet" {...p} />;
        const Eye = (p) => <Icon name="eye" {...p} />;
        const EyeOff = (p) => <Icon name="eye-off" {...p} />;
        const Edit = (p) => <Icon name="edit" {...p} />;
        const Trash2 = (p) => <Icon name="trash-2" {...p} />;
        const Home = (p) => <Icon name="home" {...p} />;
        const FileSignature = (p) => <Icon name="file-signature" {...p} />;
        const Save = (p) => <Icon name="save" {...p} />;
        const Settings = (p) => <Icon name="settings" {...p} />;
        const Layers = (p) => <Icon name="layers" {...p} />;
        const Hammer = (p) => <Icon name="hammer" {...p} />;
        const FileMinus = (p) => <Icon name="file-minus" {...p} />;
        const FileText = (p) => <Icon name="file-text" {...p} />;
        const FileDown = (p) => <Icon name="file-down" {...p} />;

        // ==========================================
        // 1. الإعدادات والبيانات الافتراضية
        // ==========================================
        const initialSettings = {
            currentSchool: 'مدرسة الرواد الأهلية',
            currentYear: '1445-1446',
            currentTerm: 'الفصل الدراسي الأول',
            years: ['1444-1445', '1445-1446', '1446-1447'],
            terms: ['الفصل الدراسي الأول', 'الفصل الدراسي الثاني', 'الفصل الدراسي الثالث'],
            schools: ['مدرسة الرواد الأهلية', 'مجمع النور التعليمي'],
            stages: ['الابتدائية', 'المتوسطة', 'الثانوية'],
            grades: ['الأول', 'الثاني', 'الثالث', 'الرابع', 'الخامس', 'السادس'],
            classes: ['أ', 'ب', 'ج', 'د']
        };

        const initialUsers = [
            { id: 'u1', username: 'Mahmoud', password: 'Ma@521990', role: 'admin', type: 'admin', name: 'مدير النظام محمود', stages: [], grades: [], classes: [], schools: ['الجميع'] },
        ];

        const labsInfo = {
            admin: { name: 'إدارة النظام', icon: ShieldCheck, color: 'text-slate-800', bg: 'bg-slate-100' },
            all: { name: 'جميع المعامل', icon: Database, color: 'text-indigo-600', bg: 'bg-indigo-50' }, 
            science_primary: { name: 'معمل العلوم الأولية', icon: Activity, color: 'text-emerald-600', bg: 'bg-emerald-50' },
            science_upper: { name: 'معمل علوم العليا', icon: Layers, color: 'text-teal-600', bg: 'bg-teal-50' },
            biology: { name: 'معمل الأحياء', icon: Microscope, color: 'text-green-600', bg: 'bg-green-50' },
            chemistry: { name: 'معمل الكيمياء', icon: FlaskConical, color: 'text-blue-600', bg: 'bg-blue-50' },
            physics: { name: 'معمل الفيزياء', icon: Atom, color: 'text-purple-600', bg: 'bg-purple-50' },
        };

        const userTypes = { admin: 'مدير نظام', supervisor: 'مشرف معمل', coordinator: 'منسق مادة', teacher: 'معلم' };
        const days = ['الأحد', 'الإثنين', 'الثلاثاء', 'الأربعاء', 'الخميس'];
        const periods = ['الحصة 1', 'الحصة 2', 'الحصة 3', 'الحصة 4', 'الحصة 5', 'الحصة 6', 'الحصة 7', 'الحصة 8'];

        // Helper to sync with Firebase
        const useFirebaseSync = (collectionName, initialData, authUser) => {
            const [data, setData] = useState(initialData);
            const [loading, setLoading] = useState(true);
            const isLocalFallback = useRef(false);

            useEffect(() => {
                if (!window.firebaseDB || !authUser) {
                    setLoading(false);
                    return;
                }
                
                if (isLocalFallback.current) {
                    setLoading(false);
                    return;
                }

                const { doc, onSnapshot, setDoc } = window.firebaseModules;
                
                // CRITICAL FIX: Use strict public path logic rule
                const docPath = `artifacts/${window.appId}/public/data/${collectionName}`;
                const docId = "default_document"; 

                const docRef = doc(window.firebaseDB, docPath, docId);

                const unsubscribe = onSnapshot(docRef, (docSnap) => {
                    if (docSnap.exists()) {
                        try {
                            const parsedData = JSON.parse(docSnap.data().items);
                            setData(parsedData);
                        } catch (e) {
                            console.warn(`Could not parse ${collectionName} data:`, e);
                            setData(initialData);
                        }
                    } else {
                        // Document doesn't exist
                        setData(initialData);
                    }
                    setLoading(false);
                }, (error) => {
                    console.warn(`Could not sync ${collectionName} with Firebase. Using local state. Reason: ${error.message}`);
                    setData(initialData);
                    isLocalFallback.current = true;
                    setLoading(false); 
                });

                return () => unsubscribe();
            }, [collectionName, authUser]);

            const updateData = async (newData) => {
                setData(newData); // Optimistic update
                if (window.firebaseDB && authUser) {
                    try {
                        const { doc, setDoc } = window.firebaseModules;
                        const docPath = `artifacts/${window.appId}/public/data/${collectionName}`;
                        const docId = "default_document";
                        const docRef = doc(window.firebaseDB, docPath, docId);
                        
                        await setDoc(docRef, { items: JSON.stringify(newData) });
                    } catch (error) {
                        console.warn(`Could not save ${collectionName} to Firebase. Data saved locally. Reason: ${error.message}`);
                    }
                }
            };

            return [data, updateData, loading];
        };

        // ==========================================
        // 2. التطبيق الرئيسي
        // ==========================================
        function App() {
            const [currentUser, setCurrentUser] = useState(null);
            const [adminActiveLab, setAdminActiveLab] = useState(null);
            const [authUser, setAuthUser] = useState(null);
            const [authLoading, setAuthLoading] = useState(true);

            // Handle Firebase Authentication First
            useEffect(() => {
                if (!window.firebaseAuth) {
                    setAuthLoading(false);
                    return;
                }

                const initAuth = async () => {
                    try {
                        const { signInWithCustomToken, signInAnonymously } = window.firebaseModules;
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(window.firebaseAuth, __initial_auth_token);
                        } else {
                            await signInAnonymously(window.firebaseAuth);
                        }
                    } catch (error) {
                        // Changed to warn so it doesn't trigger a hard error in the UI.
                        console.warn("تنبيه: لم يتم تفعيل تسجيل الدخول المجهول (Anonymous Auth) في إعدادات Firebase الخاصة بك. النظام يعمل الآن على الذاكرة المحلية لتفادي توقف العمل.", error.message);
                        setAuthLoading(false);
                    }
                };

                initAuth();

                const { onAuthStateChanged } = window.firebaseModules;
                const unsubscribe = onAuthStateChanged(window.firebaseAuth, (user) => {
                    setAuthUser(user);
                    setAuthLoading(false);
                });

                return () => unsubscribe();
            }, []);
            
            // Firebase synced states
            const [appSettingsData, setAppSettings, settingsLoading] = useFirebaseSync('settings', [initialSettings], authUser);
            const appSettings = appSettingsData[0] || initialSettings;
            
            const [inventory, setInventory, invLoading] = useFirebaseSync('inventory', [], authUser);
            const [transactions, setTransactions, transLoading] = useFirebaseSync('transactions', [], authUser);
            const [users, setUsers, usersLoading] = useFirebaseSync('users', initialUsers, authUser);
            const [minutes, setMinutes, minLoading] = useFirebaseSync('minutes', [], authUser);
            const [preparations, setPreparations, prepLoading] = useFirebaseSync('preparations', [], authUser);
            
            const initialSchedules = Object.keys(labsInfo).filter(k=>k!=='admin' && k!=='all').reduce((acc, lab) => {
                acc[lab] = days.reduce((dAcc, day) => { dAcc[day] = periods.reduce((pAcc, p) => ({...pAcc, [p]: {class: '', teacher: ''}}), {}); return dAcc; }, {});
                return acc;
            }, {});
            const [schedulesData, setSchedules, schedLoading] = useFirebaseSync('schedules', [initialSchedules], authUser);
            const schedules = schedulesData[0] || initialSchedules;

            const [activeYearFilter, setActiveYearFilter] = useState('');

            // Set initial year filter once settings are loaded
            useEffect(() => {
                if(appSettings && appSettings.currentYear && !activeYearFilter) {
                    setActiveYearFilter(appSettings.currentYear);
                }
            }, [appSettings, activeYearFilter]);

            const updateSettingsObj = (newObj) => setAppSettings([newObj]);
            const updateSchedulesObj = (newObj) => setSchedules([newObj]);

            // [تم الإصلاح هنا]: الانتظار حتى يتم تحميل كافة البيانات الضرورية بما فيها قائمة المستخدمين (usersLoading) 
            // لكي لا تظهر شاشة الدخول وبها المستخدم الافتراضي (المدير) فقط قبل استكمال التحميل.
            const isDataLoading = settingsLoading || usersLoading || invLoading || transLoading || minLoading || prepLoading || schedLoading;
            const isLoading = authLoading || (authUser && isDataLoading);

            if (isLoading) {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center bg-slate-50 gap-4">
                        <div className="w-12 h-12 border-4 border-blue-200 border-t-blue-600 rounded-full animate-spin"></div>
                        <div className="text-xl font-bold text-blue-600 animate-pulse">جاري الاتصال وتجهيز النظام والقوائم...</div>
                    </div>
                );
            }

            if (!currentUser) return <LoginScreen onLogin={setCurrentUser} usersList={users} />;

            if (currentUser.type === 'admin' && !adminActiveLab) {
                return <AdminHub user={currentUser} onSelectLab={setAdminActiveLab} onLogout={() => setCurrentUser(null)} appSettings={appSettings} />;
            }

            const activeRole = currentUser.type === 'admin' && adminActiveLab && !['users', 'settings', 'minutes_global'].includes(adminActiveLab) ? adminActiveLab : currentUser.role;

            return (
                <Dashboard 
                    user={currentUser} activeRole={activeRole} adminActiveLab={adminActiveLab}
                    onBackToHub={() => setAdminActiveLab(null)} onLogout={() => setCurrentUser(null)} 
                    appSettings={appSettings} setAppSettings={updateSettingsObj} 
                    activeYearFilter={activeYearFilter || appSettings.currentYear} setActiveYearFilter={setActiveYearFilter}
                    inventory={inventory} setInventory={setInventory}
                    transactions={transactions} setTransactions={setTransactions}
                    users={users} setUsers={setUsers}
                    minutes={minutes} setMinutes={setMinutes}
                    preparations={preparations} setPreparations={setPreparations}
                    schedules={schedules} setSchedules={updateSchedulesObj}
                />
            );
        }

        // ==========================================
        // شاشات الدخول واللوحات
        // ==========================================
        function LoginScreen({ onLogin, usersList }) {
            const [username, setUsername] = useState('');
            const [password, setPassword] = useState('');
            const [error, setError] = useState('');
            const [showPwd, setShowPwd] = useState(false);

            const handleLogin = (e) => {
                e.preventDefault();
                // تم إضافة trim للتأكد من عدم وجود مسافات فارغة تمنع الدخول
                const cleanUser = username.trim(); 
                const user = usersList.find(u => u.username === cleanUser && u.password === password);
                if (user) onLogin(user);
                else setError('بيانات الدخول غير صحيحة، تأكد من اسم المستخدم وكلمة المرور');
            };

            return (
                <div className="min-h-screen bg-slate-50 flex flex-col items-center justify-center p-4">
                    <div className="w-full max-w-md bg-white border border-slate-200 rounded-3xl shadow-xl p-8 md:p-12 animate-in">
                        <div className="text-center mb-8">
                            <div className="w-20 h-20 bg-blue-50 rounded-full flex items-center justify-center mx-auto mb-4 border border-blue-100 shadow-sm">
                                <Atom className="w-10 h-10 text-blue-600" />
                            </div>
                            <h1 className="text-3xl font-black text-slate-800 mb-2">نظام المعامل ERP</h1>
                            <p className="text-slate-500 font-medium">تسجيل الدخول الموحد</p>
                        </div>
                        
                        <form onSubmit={handleLogin} className="space-y-6">
                            {error && <div className="bg-red-50 text-red-600 p-3 rounded-xl text-sm text-center font-bold border border-red-100">{error}</div>}
                            
                            <div>
                                <label className="block text-sm font-bold text-slate-700 mb-2">اسم المستخدم</label>
                                <input type="text" value={username} onChange={e=>setUsername(e.target.value)} className="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:bg-white outline-none transition-all font-mono" dir="ltr" placeholder="Username" />
                            </div>
                            
                            <div className="relative">
                                <label className="block text-sm font-bold text-slate-700 mb-2">كلمة المرور</label>
                                <input type={showPwd ? "text" : "password"} value={password} onChange={e=>setPassword(e.target.value)} className="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:bg-white outline-none transition-all pr-12 font-mono" dir="ltr" placeholder="••••••••" />
                                <button type="button" onClick={()=>setShowPwd(!showPwd)} className="absolute left-4 top-[42px] text-slate-400 hover:text-blue-600 transition-colors">
                                    {showPwd ? <EyeOff className="w-6 h-6"/> : <Eye className="w-6 h-6"/>}
                                </button>
                            </div>
                            
                            <button type="submit" className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-lg transition-all">
                                تسجيل الدخول
                            </button>
                        </form>
                    </div>
                </div>
            );
        }

        function AdminHub({ user, onSelectLab, onLogout, appSettings }) {
            const labKeys = Object.keys(labsInfo).filter(k => k !== 'admin' && k !== 'all');
            return (
                <div className="min-h-screen bg-slate-50 flex flex-col animate-in">
                    <header className="bg-white border-b p-6 flex justify-between items-center shadow-sm">
                        <div>
                            <h1 className="text-2xl font-black text-slate-800">بوابة مدير النظام الإدارية</h1>
                            <p className="text-slate-500 font-bold mt-1 text-sm flex items-center gap-2">
                                <span className="bg-slate-100 px-2 py-1 rounded">المدرسة: {appSettings.currentSchool}</span>
                                <span className="bg-slate-100 px-2 py-1 rounded">العام: {appSettings.currentYear}</span>
                                <span className="bg-slate-100 px-2 py-1 rounded">{appSettings.currentTerm}</span>
                            </p>
                        </div>
                        <button onClick={onLogout} className="flex items-center gap-2 text-red-600 bg-red-50 hover:bg-red-100 px-5 py-2.5 rounded-xl font-bold transition-colors shadow-sm"><LogOut className="w-5 h-5" /> خروج آمن</button>
                    </header>
                    
                    <main className="flex-1 p-8 max-w-6xl mx-auto w-full space-y-8 animate-in">
                        <h2 className="text-xl font-bold text-slate-700 flex items-center gap-2"><Activity className="text-blue-500 w-5 h-5"/> التوجه السريع للمعامل</h2>
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                            {labKeys.map(key => {
                                const IconComp = labsInfo[key].icon;
                                return (
                                    <button key={key} onClick={() => onSelectLab(key)} className="bg-white border border-slate-200 p-6 rounded-3xl shadow-sm hover:shadow-lg transition-all flex flex-col items-center gap-4 hover:-translate-y-2 group">
                                        <div className={`p-5 rounded-2xl ${labsInfo[key].bg} group-hover:scale-110 transition-transform`}><IconComp className={`w-12 h-12 ${labsInfo[key].color}`} /></div>
                                        <h3 className="font-bold text-slate-800 text-lg">{labsInfo[key].name}</h3>
                                    </button>
                                );
                            })}
                        </div>
                        
                        <div className="bg-white border border-slate-200 p-8 rounded-3xl shadow-sm mt-8">
                            <h2 className="text-xl font-bold mb-6 flex items-center gap-2 text-slate-800"><Settings className="w-6 h-6 text-slate-600" /> الإدارة المركزية والتهيئة</h2>
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                <button onClick={() => onSelectLab('settings')} className="bg-slate-50 border border-slate-200 p-5 rounded-2xl flex items-center gap-4 text-right hover:bg-slate-100 transition-colors group">
                                    <div className="bg-slate-800 text-white p-3 rounded-xl group-hover:scale-105 transition-transform"><Layers className="w-6 h-6" /></div>
                                    <div><h4 className="font-bold text-slate-900 text-lg">الهيكلة المدرسية</h4><p className="text-slate-500 text-sm mt-1">المراحل، الصفوف، الأعوام</p></div>
                                </button>
                                <button onClick={() => onSelectLab('users')} className="bg-blue-50 border border-blue-100 p-5 rounded-2xl flex items-center gap-4 text-right hover:bg-blue-100 transition-colors group">
                                    <div className="bg-blue-600 text-white p-3 rounded-xl group-hover:scale-105 transition-transform"><Users className="w-6 h-6" /></div>
                                    <div><h4 className="font-bold text-blue-900 text-lg">تسكين المستخدمين</h4><p className="text-blue-700 text-sm mt-1">توزيع المعلمين والمشرفين</p></div>
                                </button>
                                <button onClick={() => onSelectLab('minutes_global')} className="bg-orange-50 border border-orange-100 p-5 rounded-2xl flex items-center gap-4 text-right hover:bg-orange-100 transition-colors group">
                                    <div className="bg-orange-600 text-white p-3 rounded-xl group-hover:scale-105 transition-transform"><FileSignature className="w-6 h-6" /></div>
                                    <div><h4 className="font-bold text-orange-900 text-lg">أرشيف المحاضر</h4><p className="text-orange-700 text-sm mt-1">كسر، إعدام، فقدان</p></div>
                                </button>
                            </div>
                        </div>
                    </main>
                </div>
            );
        }

        // ==========================================
        // 3. لوحة القيادة (Dashboard)
        // ==========================================
        function Dashboard({ 
            user, activeRole, adminActiveLab, onBackToHub, onLogout, 
            appSettings, setAppSettings, activeYearFilter, setActiveYearFilter, 
            inventory, setInventory, transactions, setTransactions, 
            users, setUsers, minutes, setMinutes, preparations, setPreparations, schedules, setSchedules 
        }) {
            const [activeTab, setActiveTab] = useState(
                adminActiveLab === 'users' ? 'users' : adminActiveLab === 'settings' ? 'settings' : adminActiveLab === 'minutes_global' ? 'minutes' : 'inventory'
            );
            
            // إضافة خاصية اختيار المعمل للمسكنين على "جميع المعامل"
            const [subLab, setSubLab] = useState('science_primary');
            const effectiveRole = activeRole === 'all' ? subLab : activeRole;
            
            // تحديد نطاق المدارس المسموح بها للمستخدم
            const userSchools = (user.type === 'admin' || !user.schools || user.schools.includes('الجميع') || user.schools.length === 0) ? appSettings.schools : user.schools;
            const [activeSchoolFilter, setActiveSchoolFilter] = useState(userSchools[0] || appSettings.currentSchool);

            useEffect(() => {
                if (!userSchools.includes(activeSchoolFilter) && userSchools.length > 0) {
                    setActiveSchoolFilter(userSchools[0]);
                }
            }, [userSchools, activeSchoolFilter]);
            
            // فلترة العهدة بناءً على المدرسة النشطة
            const schoolInventory = inventory.filter(item => !item.school || item.school === activeSchoolFilter);
            const userInventory = effectiveRole === 'admin' ? schoolInventory : schoolInventory.filter(item => item.lab === effectiveRole);
            const isTeacher = user.type === 'teacher';

            const menuItems = [
                { id: 'inventory', name: 'جرد المعمل', icon: Database, show: !['users', 'settings'].includes(adminActiveLab) },
                { id: 'supply', name: 'التوريد', icon: PackagePlus, show: !isTeacher && !['users', 'settings', 'minutes_global'].includes(adminActiveLab) },
                { id: 'consumption', name: 'الاستهلاك', icon: Activity, show: !isTeacher && !['users', 'settings', 'minutes_global'].includes(adminActiveLab) },
                { id: 'expiry', name: 'الصلاحية والإعدام', icon: AlertTriangle, show: !isTeacher && !['users', 'settings', 'minutes_global'].includes(adminActiveLab) },
                { id: 'transfer', name: 'نقل العهدة', icon: ArrowRightLeft, show: !isTeacher && !['users', 'settings', 'minutes_global'].includes(adminActiveLab) },
                { id: 'preparation', name: 'التحضير الإلكتروني', icon: ClipboardList, show: !['users', 'settings', 'minutes_global'].includes(adminActiveLab) },
                { id: 'schedule', name: 'الجدول المدرسي', icon: CalendarDays, show: !['users', 'settings', 'minutes_global'].includes(adminActiveLab) },
                { id: 'minutes', name: 'المحاضر', icon: FileSignature, show: !isTeacher && !['users', 'settings'].includes(adminActiveLab) },
                { id: 'reports', name: 'التقارير الشاملة', icon: Printer, show: !isTeacher && !['users', 'settings', 'minutes_global'].includes(adminActiveLab) },
                { id: 'users', name: 'تسكين المستخدمين', icon: Users, show: adminActiveLab === 'users' },
                { id: 'settings', name: 'إعدادات الهيكلة', icon: Layers, show: adminActiveLab === 'settings' },
            ];

            return (
                <div className="min-h-screen bg-white flex flex-col md:flex-row animate-in">
                    <aside className="w-full md:w-64 bg-slate-50 border-l border-slate-200 flex flex-col print:hidden shadow-[inset_-1px_0_0_rgba(0,0,0,0.05)] z-10">
                        <div className="p-5 border-b border-slate-200 bg-white">
                            <div className="flex items-center gap-3">
                                <div className={`p-2.5 rounded-xl ${labsInfo[effectiveRole]?.bg || labsInfo.admin.bg} ${labsInfo[effectiveRole]?.color || labsInfo.admin.color}`}>
                                    {React.createElement(labsInfo[effectiveRole]?.icon || labsInfo.admin.icon, { className: 'w-6 h-6' })}
                                </div>
                                <div>
                                    <h2 className="font-bold text-sm text-slate-800 leading-tight">{labsInfo[effectiveRole]?.name || 'إدارة النظام'}</h2>
                                    <span className="text-[10px] font-bold text-slate-500 bg-slate-100 border border-slate-200 px-2 py-0.5 rounded mt-1.5 block w-max">{userTypes[user.type]}</span>
                                </div>
                            </div>
                        </div>
                        <nav className="flex-1 overflow-y-auto p-3 space-y-1 custom-scrollbar">
                            {menuItems.filter(i => i.show).map(item => {
                                const IconComponent = item.icon;
                                return (
                                    <button key={item.id} onClick={() => setActiveTab(item.id)} className={`w-full flex items-center gap-3 px-3 py-3 rounded-xl transition-all font-bold text-sm ${activeTab === item.id ? 'bg-blue-600 text-white shadow-md' : 'text-slate-600 hover:bg-slate-200 hover:text-slate-900'}`}>
                                        <IconComponent className={`w-4 h-4 ${activeTab === item.id ? 'text-blue-200' : 'text-slate-400'}`} /> {item.name}
                                    </button>
                                )
                            })}
                        </nav>
                        <div className="p-4 border-t border-slate-200 bg-white space-y-2">
                            {user.type === 'admin' && <button onClick={onBackToHub} className="w-full flex items-center justify-center gap-2 px-4 py-2.5 text-sm bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-xl font-bold transition-colors"><Home className="w-4 h-4" /> العودة للرئيسية</button>}
                            <button onClick={onLogout} className="w-full flex items-center justify-center gap-2 px-4 py-2.5 text-sm text-red-600 bg-red-50 hover:bg-red-100 rounded-xl font-bold transition-colors"><LogOut className="w-4 h-4" /> تسجيل خروج</button>
                        </div>
                    </aside>
                    <main className="flex-1 flex flex-col min-h-screen bg-slate-50/30 relative">
                        {!['users', 'settings'].includes(activeTab) && (
                            <header className="bg-white border-b border-slate-200 p-4 flex flex-wrap justify-between items-center print:hidden shadow-sm z-0 gap-4">
                                <div className="flex flex-wrap items-center gap-4">
                                    <div className="flex items-center gap-3 font-bold text-slate-700">
                                        <span className="text-sm bg-slate-100 px-3 py-1.5 rounded-lg border border-slate-200">أرشيف العام:</span>
                                        <select value={activeYearFilter} onChange={e=>setActiveYearFilter(e.target.value)} className="border-2 border-blue-200 p-1.5 rounded-lg bg-blue-50 outline-none text-sm text-blue-800 focus:border-blue-500 transition-colors cursor-pointer">
                                            {appSettings.years.map(y => <option key={y} value={y}>{y}</option>)}
                                        </select>
                                    </div>
                                    <div className="flex items-center gap-2 font-bold text-emerald-700 border-r-2 border-slate-200 pr-4">
                                        <span className="text-sm bg-emerald-100 px-3 py-1.5 rounded-lg border border-emerald-200">المدرسة:</span>
                                        <select value={activeSchoolFilter} onChange={e=>setActiveSchoolFilter(e.target.value)} className="border-2 border-emerald-200 p-1.5 rounded-lg bg-emerald-50 outline-none text-sm text-emerald-800 focus:border-emerald-500 transition-colors cursor-pointer max-w-[200px] truncate">
                                            {userSchools.map(s => <option key={s} value={s}>{s}</option>)}
                                        </select>
                                    </div>
                                    {activeRole === 'all' && (
                                        <div className="flex items-center gap-2 font-bold text-indigo-700 border-r-2 border-slate-200 pr-4">
                                            <span className="text-sm bg-indigo-100 px-3 py-1.5 rounded-lg border border-indigo-200">اختر المعمل:</span>
                                            <select value={subLab} onChange={e=>setSubLab(e.target.value)} className="border-2 border-indigo-200 p-1.5 rounded-lg bg-indigo-50 outline-none text-sm text-indigo-800 focus:border-indigo-500 transition-colors cursor-pointer">
                                                {Object.keys(labsInfo).filter(k=>k!=='admin' && k!=='all').map(k => <option key={k} value={k}>{labsInfo[k].name}</option>)}
                                            </select>
                                        </div>
                                    )}
                                </div>
                                <div className="text-xs font-bold text-slate-500 bg-slate-100 border border-slate-200 px-4 py-2 rounded-xl flex items-center gap-2">
                                    <span>{appSettings.currentTerm}</span>
                                </div>
                            </header>
                        )}
                        <div className="flex-1 overflow-y-auto p-6 md:p-8 print:p-0">
                            <div className="max-w-6xl mx-auto print:max-w-none">
                                {activeTab === 'settings' && <StructureSettingsView appSettings={appSettings} setAppSettings={setAppSettings} />}
                                {activeTab === 'users' && <UsersManagementView users={users} setUsers={setUsers} appSettings={appSettings} />}
                                
                                {activeTab === 'inventory' && <InventoryView inventory={inventory} user={user} setInventory={setInventory} setMinutes={setMinutes} minutes={minutes} activeRole={effectiveRole} appSettings={appSettings} setTransactions={setTransactions} transactions={transactions} users={users} activeSchoolFilter={activeSchoolFilter} />}
                                {activeTab === 'supply' && <SupplyView inventory={inventory} setInventory={setInventory} transactions={transactions} setTransactions={setTransactions} activeRole={effectiveRole} user={user} appSettings={appSettings} activeSchoolFilter={activeSchoolFilter} />}
                                {activeTab === 'consumption' && <ConsumptionView inventory={inventory} setInventory={setInventory} transactions={transactions} setTransactions={setTransactions} activeRole={effectiveRole} user={user} appSettings={appSettings} users={users} activeSchoolFilter={activeSchoolFilter} />}
                                {activeTab === 'expiry' && <ExpiryView inventory={inventory} setInventory={setInventory} minutes={minutes} setMinutes={setMinutes} transactions={transactions} setTransactions={setTransactions} user={user} activeRole={effectiveRole} appSettings={appSettings} activeSchoolFilter={activeSchoolFilter} />}
                                {activeTab === 'transfer' && <TransferView inventory={inventory} setInventory={setInventory} transactions={transactions} setTransactions={setTransactions} activeRole={effectiveRole} user={user} appSettings={appSettings} minutes={minutes} setMinutes={setMinutes} activeSchoolFilter={activeSchoolFilter} />}
                                
                                {activeTab === 'preparation' && <EPreparationView preparations={preparations} setPreparations={setPreparations} inventory={inventory} user={user} activeRole={effectiveRole} appSettings={appSettings} activeYearFilter={activeYearFilter} activeSchoolFilter={activeSchoolFilter} />}
                                {activeTab === 'schedule' && <ScheduleView activeRole={effectiveRole} schedules={schedules} setSchedules={setSchedules} users={users} appSettings={appSettings} user={user} activeSchoolFilter={activeSchoolFilter} />}
                                {activeTab === 'minutes' && <MinutesView minutes={minutes} activeRole={effectiveRole} activeYearFilter={activeYearFilter} activeSchoolFilter={activeSchoolFilter} />}
                                {activeTab === 'reports' && <ReportsView inventory={inventory} transactions={transactions} activeRole={effectiveRole} activeYearFilter={activeYearFilter} activeSchoolFilter={activeSchoolFilter} />}
                            </div>
                        </div>
                    </main>
                </div>
            );
        }

        // ==========================================
        // 4. الشاشات والمكونات (Views) - Dynamic & Animated
        // ==========================================

        const ViewHeader = ({ title, desc }) => (
            <div className="border-b border-slate-200 pb-4 mb-6 flex justify-between items-end print:hidden">
                <div>
                    <h2 className="text-3xl font-black text-slate-800 tracking-tight">{title}</h2>
                    {desc && <p className="text-slate-500 mt-1 font-medium">{desc}</p>}
                </div>
                <button onClick={()=>window.print()} className="bg-white border border-slate-300 text-slate-700 hover:bg-slate-50 hover:text-blue-600 px-4 py-2 rounded-xl font-bold text-sm flex items-center gap-2 shadow-sm transition-all active:scale-95">
                    <Printer className="w-4 h-4"/> طباعة
                </button>
            </div>
        );

        // --- إعدادات الهيكلة (Admin Only) ---
        function StructureSettingsView({ appSettings, setAppSettings }) {
            const handleDel = (field, idx) => {
                if(window.confirm('تأكيد الحذف؟')) {
                    const arr = [...appSettings[field]];
                    arr.splice(idx, 1);
                    setAppSettings({...appSettings, [field]: arr});
                }
            };

            const handleAddSubmit = (e, field, newVal, setNewVal) => {
                e.preventDefault();
                if(newVal.trim() !== '') {
                    setAppSettings({...appSettings, [field]: [...appSettings[field], newVal.trim()]});
                    setNewVal('');
                }
            };

            const Section = ({ title, field, placeholder }) => {
                const [newVal, setNewVal] = useState('');
                return (
                    <div className="border border-slate-200 rounded-2xl p-5 bg-white shadow-sm flex flex-col h-full hover:shadow-md transition-shadow">
                        <h3 className="font-bold text-slate-800 mb-4 border-b pb-2">{title}</h3>
                        <div className="flex flex-wrap gap-2 mb-4 flex-1 content-start">
                            {appSettings[field].map((item, idx) => (
                                <div key={idx} className="bg-slate-50 text-sm font-bold px-3 py-1.5 rounded-lg flex items-center gap-2 border border-slate-200 text-slate-700">
                                    {item} <button onClick={()=>handleDel(field, idx)} className="text-red-400 hover:text-red-600 hover:bg-red-50 p-0.5 rounded transition-colors"><XCircle className="w-4 h-4"/></button>
                                </div>
                            ))}
                            {appSettings[field].length === 0 && <span className="text-xs text-slate-400">لا توجد بيانات مضافة</span>}
                        </div>
                        <form onSubmit={(e) => handleAddSubmit(e, field, newVal, setNewVal)} className="flex gap-2 mt-auto pt-4 border-t border-slate-100">
                            <input type="text" value={newVal} onChange={e=>setNewVal(e.target.value)} placeholder={placeholder} className="flex-1 p-2.5 border border-slate-300 rounded-xl text-sm outline-none focus:border-blue-500 focus:ring-2 font-bold text-slate-700 transition-all" />
                            <button type="submit" className="bg-blue-600 text-white px-4 py-2.5 rounded-xl text-sm font-bold hover:bg-blue-700 flex items-center gap-1 shadow-sm transition-colors"><PlusCircle className="w-4 h-4" /> إضافة</button>
                        </form>
                    </div>
                );
            };

            return (
                <div className="animate-in fade-in">
                    <ViewHeader title="إعدادات الهيكلة المدرسية" desc="إدارة الفصول والأعوام الدراسية لتنعكس تلقائياً في النظام" />
                    <div className="bg-gradient-to-r from-blue-50 to-indigo-50 p-6 rounded-3xl border border-blue-100 grid grid-cols-1 md:grid-cols-3 gap-6 shadow-sm mb-8">
                        <div><label className="block text-sm font-bold text-blue-900 mb-2">المدرسة الافتراضية النشطة</label><select value={appSettings.currentSchool} onChange={e=>setAppSettings({...appSettings, currentSchool: e.target.value})} className="w-full p-3 border border-white rounded-xl outline-none font-bold shadow-sm focus:ring-2 focus:ring-blue-500 cursor-pointer">{appSettings.schools.map(s=><option key={s} value={s}>{s}</option>)}</select></div>
                        <div><label className="block text-sm font-bold text-blue-900 mb-2">العام الدراسي الافتراضي النشط</label><select value={appSettings.currentYear} onChange={e=>setAppSettings({...appSettings, currentYear: e.target.value})} className="w-full p-3 border border-white rounded-xl outline-none font-bold shadow-sm focus:ring-2 focus:ring-blue-500 cursor-pointer">{appSettings.years.map(y=><option key={y} value={y}>{y}</option>)}</select></div>
                        <div><label className="block text-sm font-bold text-blue-900 mb-2">الفصل الدراسي النشط</label><select value={appSettings.currentTerm} onChange={e=>setAppSettings({...appSettings, currentTerm: e.target.value})} className="w-full p-3 border border-white rounded-xl outline-none font-bold shadow-sm focus:ring-2 focus:ring-blue-500 cursor-pointer">{appSettings.terms.map(y=><option key={y} value={y}>{y}</option>)}</select></div>
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                        <Section title="المدارس التابعة" field="schools" placeholder="اسم المدرسة..." />
                        <Section title="الأعوام الدراسية" field="years" placeholder="مثال: 1446-1447" />
                        <Section title="الفصول الدراسية (الترم)" field="terms" placeholder="الفصل الدراسي..." />
                        <Section title="المراحل الدراسية" field="stages" placeholder="مثال: الثانوية" />
                        <Section title="الصفوف الدراسية" field="grades" placeholder="مثال: الأول" />
                        <Section title="الفصول الدراسية (الشعب)" field="classes" placeholder="مثال: أ، 1، A" />
                    </div>
                </div>
            );
        }

        // --- إدارة وتسكين المستخدمين ---
        function UsersManagementView({ users, setUsers, appSettings }) {
            const [formData, setFormData] = useState({ id: null, username: '', password: '', role: 'science_primary', type: 'teacher', name: '', stages: [], grades: [], classes: [], schools: ['الجميع'] });
            const [isEditing, setIsEditing] = useState(false);

            const toggleArrayItem = (arr, item) => arr.includes(item) ? arr.filter(i => i !== item) : [...arr, item];

            const handleSubmit = (e) => {
                e.preventDefault();
                const cleanUsername = formData.username.trim(); 
                
                if (isEditing) {
                    setUsers(users.map(u => u.id === formData.id ? { ...formData, username: cleanUsername } : u));
                    setIsEditing(false);
                } else {
                    if (users.find(u => u.username === cleanUsername)) return alert("اسم المستخدم موجود مسبقاً!");
                    setUsers([...users, { id: 'u' + Date.now(), ...formData, username: cleanUsername }]);
                }
                setFormData({ id: null, username: '', password: '', role: 'science_primary', type: 'teacher', name: '', stages: [], grades: [], classes: [], schools: ['الجميع'] });
            };

            const handleEdit = (u) => { setFormData({...u, schools: u.schools || ['الجميع']}); setIsEditing(true); };
            const handleDelete = (id) => { if(window.confirm("تأكيد الحذف؟")) setUsers(users.filter(u => u.id !== id)); };

            return (
                <div className="animate-in fade-in">
                    <ViewHeader title="إدارة وتسكين المستخدمين" desc="توزيع المعلمين والمشرفين على المعامل والفصول والمدارس" />
                    <div className="grid grid-cols-1 xl:grid-cols-3 gap-6 items-start">
                        <div className="xl:col-span-1 bg-white border border-slate-200 rounded-3xl p-6 shadow-sm sticky top-6">
                            <h3 className="text-xl font-bold mb-4 border-b pb-2">{isEditing ? 'تعديل وتسكين مستخدم' : 'إضافة مستخدم جديد'}</h3>
                            <form onSubmit={handleSubmit} className="space-y-4 max-h-[70vh] overflow-y-auto pr-2 custom-scrollbar">
                                <div><label className="block text-xs font-bold mb-1 text-slate-600">الاسم الكامل</label><input required type="text" value={formData.name} onChange={e=>setFormData({...formData, name: e.target.value})} className="w-full p-2.5 text-sm border border-slate-300 rounded-xl outline-none focus:ring-2 focus:ring-blue-500" /></div>
                                <div className="flex gap-3">
                                    <div className="flex-1"><label className="block text-xs font-bold mb-1 text-slate-600">المستخدم</label><input required type="text" value={formData.username} onChange={e=>setFormData({...formData, username: e.target.value})} className="w-full p-2.5 text-sm border border-slate-300 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 font-mono" dir="ltr" /></div>
                                    <div className="flex-1"><label className="block text-xs font-bold mb-1 text-slate-600">المرور</label><input required type="text" value={formData.password} onChange={e=>setFormData({...formData, password: e.target.value})} className="w-full p-2.5 text-sm border border-slate-300 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 font-mono" dir="ltr" /></div>
                                </div>
                                <div className="flex gap-3">
                                    <div className="flex-1"><label className="block text-xs font-bold mb-1 text-slate-600">الرتبة</label><select value={formData.type} onChange={e=>setFormData({...formData, type: e.target.value})} className="w-full p-2.5 text-sm border border-slate-300 rounded-xl bg-white font-bold focus:ring-2 focus:ring-blue-500">{Object.entries(userTypes).map(([k, v]) => <option key={k} value={k}>{v}</option>)}</select></div>
                                    {formData.type !== 'admin' && <div className="flex-1"><label className="block text-xs font-bold mb-1 text-slate-600">المعمل</label><select value={formData.role} onChange={e=>setFormData({...formData, role: e.target.value})} className="w-full p-2.5 text-sm border border-slate-300 rounded-xl bg-white font-bold focus:ring-2 focus:ring-blue-500">{Object.keys(labsInfo).filter(k=>k!=='admin').map(k => <option key={k} value={k}>{labsInfo[k].name}</option>)}</select></div>}
                                </div>
                                
                                <div className="border border-slate-200 rounded-xl p-4 bg-slate-50 space-y-4 mt-4">
                                    <h4 className="font-bold text-sm text-blue-800 border-b border-slate-200 pb-2">نطاق المدارس (تسكين المدارس)</h4>
                                    <div className="flex flex-wrap gap-2">
                                        <button type="button" onClick={()=>setFormData({...formData, schools: ['الجميع']})} className={`text-xs px-3 py-1.5 border rounded-lg font-bold transition-colors ${formData.schools?.includes('الجميع') || !formData.schools?.length ? 'bg-blue-600 text-white border-blue-600 shadow-sm' : 'bg-white border-slate-300 text-slate-600 hover:bg-slate-100'}`}>الجميع (صلاحية كاملة)</button>
                                        {appSettings.schools.map(s => (
                                            <button type="button" key={s} onClick={()=>{
                                                let current = formData.schools?.filter(x => x !== 'الجميع') || [];
                                                setFormData({...formData, schools: toggleArrayItem(current, s)});
                                            }} className={`text-xs px-3 py-1.5 border rounded-lg font-bold transition-colors ${formData.schools?.includes(s) && !formData.schools?.includes('الجميع') ? 'bg-blue-600 text-white border-blue-600 shadow-sm' : 'bg-white border-slate-300 text-slate-600 hover:bg-slate-100'}`}>{s}</button>
                                        ))}
                                    </div>
                                </div>

                                {formData.type !== 'admin' && (
                                    <div className="border border-slate-200 rounded-xl p-4 bg-slate-50 space-y-4">
                                        <h4 className="font-bold text-sm text-blue-800 border-b border-slate-200 pb-2">نطاق الفصول (اختياري)</h4>
                                        <div><span className="text-xs font-bold text-slate-500 block mb-2">المراحل:</span><div className="flex flex-wrap gap-2">{appSettings.stages.map(s => <button type="button" key={s} onClick={()=>setFormData({...formData, stages: toggleArrayItem(formData.stages, s)})} className={`text-xs px-3 py-1.5 border rounded-lg font-bold transition-colors ${formData.stages?.includes(s) ? 'bg-blue-600 text-white border-blue-600 shadow-sm' : 'bg-white border-slate-300 text-slate-600 hover:bg-slate-100'}`}>{s}</button>)}</div></div>
                                        <div><span className="text-xs font-bold text-slate-500 block mb-2">الصفوف:</span><div className="flex flex-wrap gap-2">{appSettings.grades.map(s => <button type="button" key={s} onClick={()=>setFormData({...formData, grades: toggleArrayItem(formData.grades, s)})} className={`text-xs px-3 py-1.5 border rounded-lg font-bold transition-colors ${formData.grades?.includes(s) ? 'bg-blue-600 text-white border-blue-600 shadow-sm' : 'bg-white border-slate-300 text-slate-600 hover:bg-slate-100'}`}>{s}</button>)}</div></div>
                                        <div><span className="text-xs font-bold text-slate-500 block mb-2">الفصول:</span><div className="flex flex-wrap gap-2">{appSettings.classes.map(s => <button type="button" key={s} onClick={()=>setFormData({...formData, classes: toggleArrayItem(formData.classes, s)})} className={`text-xs px-3 py-1.5 border rounded-lg font-bold transition-colors ${formData.classes?.includes(s) ? 'bg-blue-600 text-white border-blue-600 shadow-sm' : 'bg-white border-slate-300 text-slate-600 hover:bg-slate-100'}`}>{s}</button>)}</div></div>
                                    </div>
                                )}
                                <button type="submit" className={`w-full text-white font-bold py-3.5 mt-6 rounded-xl shadow-md transition-all ${isEditing ? 'bg-orange-500 hover:bg-orange-600' : 'bg-blue-600 hover:bg-blue-700'}`}>{isEditing ? 'تحديث البيانات' : 'حفظ المستخدم الجديد'}</button>
                                {isEditing && <button type="button" onClick={()=>{setIsEditing(false); setFormData({ id: null, username: '', password: '', role: 'science_primary', type: 'teacher', name: '', stages:[], grades:[], classes:[], schools: ['الجميع'] })}} className="w-full text-slate-500 font-bold py-2 hover:bg-slate-100 rounded-xl transition-colors">إلغاء التعديل</button>}
                            </form>
                        </div>
                        <div className="xl:col-span-2 bg-white border border-slate-200 rounded-3xl shadow-sm overflow-hidden">
                            <table className="w-full text-right text-sm">
                                <thead className="bg-slate-50 border-b border-slate-200"><tr><th className="p-4 font-bold text-slate-600">الاسم / المستخدم</th><th className="p-4 font-bold text-slate-600">الرتبة / المعمل</th><th className="p-4 font-bold text-slate-600">نطاق التسكين</th><th className="p-4 text-center font-bold text-slate-600">الإجراءات</th></tr></thead>
                                <tbody className="divide-y divide-slate-100">
                                    {users.map(u => (
                                        <tr key={u.id} className="hover:bg-slate-50/50 transition-colors">
                                            <td className="p-4"><div className="font-bold text-slate-800 text-base">{u.name}</div><div className="font-mono text-xs text-slate-400 mt-1" dir="ltr">{u.username} | {u.password}</div></td>
                                            <td className="p-4"><div className="font-bold text-blue-700 text-sm">{userTypes[u.type]}</div>{u.type !== 'admin' && <div className="text-[10px] bg-slate-100 border border-slate-200 px-2 py-0.5 rounded-full mt-1.5 inline-block font-bold text-slate-600">{labsInfo[u.role]?.name}</div>}</td>
                                            <td className="p-4 text-[11px] font-bold text-slate-500 space-y-1">
                                                <div><span className="text-slate-400">المدارس:</span> {u.schools?.includes('الجميع') || !u.schools?.length ? <span className="text-blue-600">الجميع</span> : u.schools.join('، ')}</div>
                                                {u.type !== 'admin' && <><div><span className="text-slate-400">مراحل:</span> {u.stages?.join('، ') || '-'}</div><div><span className="text-slate-400">صفوف:</span> {u.grades?.join('، ') || '-'}</div><div><span className="text-slate-400">فصول:</span> {u.classes?.join('، ') || '-'}</div></>}
                                                {u.type === 'admin' && <span className="bg-purple-100 text-purple-700 px-2 py-1 rounded-full border border-purple-200 mt-1 inline-block">صلاحيات مطلقة</span>}
                                            </td>
                                            <td className="p-4 text-center">
                                                <div className="flex justify-center gap-2">
                                                    <button onClick={() => handleEdit(u)} className="text-blue-500 bg-blue-50 hover:bg-blue-100 p-2 rounded-lg transition-colors" title="تعديل"><Edit className="w-4 h-4"/></button>
                                                    <button onClick={() => handleDelete(u.id)} disabled={u.type === 'admin'} className="text-red-500 bg-red-50 hover:bg-red-100 p-2 rounded-lg transition-colors disabled:opacity-30 disabled:hover:bg-red-50" title="حذف"><Trash2 className="w-4 h-4"/></button>
                                                </div>
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        }

        // --- الجرد ومحاضر الكسر والفقد المدمجة ---
        function InventoryView({ inventory, user, setInventory, setMinutes, minutes, activeRole, appSettings, setTransactions, transactions, users, activeSchoolFilter }) {
            const [filter, setFilter] = useState('all');
            const [search, setSearch] = useState('');
            
            const [incidentForm, setIncidentForm] = useState(null); 
            const [incidentData, setIncidentData] = useState({ qty: '', date: '', day: days[0], period: periods[0], gradeClass: '', teacher: '', responsible: '' });

            const labTeachers = users.filter(u => (u.role === activeRole || u.role === 'all') && ['teacher', 'coordinator', 'supervisor'].includes(u.type) && (u.schools?.includes('الجميع') || u.schools?.includes(activeSchoolFilter) || !u.schools?.length));
            const allClasses = appSettings.grades.flatMap(g => appSettings.classes.map(c => `${g} / ${c}`));

            const submitIncident = (e) => {
                e.preventDefault();
                const qty = parseFloat(incidentData.qty);
                if(isNaN(qty) || qty <= 0 || qty > incidentForm.item.quantity) return alert("الكمية المدخلة غير صحيحة أو أكبر من المتاح!");
                
                const updated = inventory.map(i => i.id === incidentForm.item.id ? { ...i, quantity: i.quantity - qty } : i);
                setInventory(updated);
                
                const minuteType = incidentForm.type === 'كسر' ? 'محضر كسر' : 'محضر فقد';
                const txType = incidentForm.type === 'كسر' ? 'breakage' : 'loss';
                const minuteId = (incidentForm.type === 'كسر' ? 'BRK-' : 'LST-') + Math.floor(1000 + Math.random() * 9000);
                
                const reasonText = `التاريخ: ${incidentData.date} | الحصة: ${incidentData.period}\nالفصل: ${incidentData.gradeClass} | المعلم: ${incidentData.teacher}\nالمسؤول: ${incidentData.responsible}`;
                
                setMinutes([{ id: minuteId, type: minuteType, item: incidentForm.item.name, code: incidentForm.item.code, quantity: qty, unit: incidentForm.item.unit, date: new Date().toISOString(), lab: activeRole, user: user.name, reason: reasonText, year: appSettings.currentYear, school: activeSchoolFilter }, ...minutes]);
                setTransactions([{ id: Date.now(), type: txType, item: incidentForm.item.name, quantity: qty, date: new Date().toISOString(), user: incidentData.teacher || user.name, lab: activeRole, year: appSettings.currentYear, details: reasonText, school: activeSchoolFilter }, ...transactions]);

                alert(`تم إنشاء ${minuteType} وخصم الكمية بنجاح.`);
                setIncidentForm(null);
                setIncidentData({ qty: '', date: '', day: days[0], period: periods[0], gradeClass: '', teacher: '', responsible: '' });
            };

            const schoolInventory = inventory.filter(i => (!i.school || i.school === activeSchoolFilter) && (activeRole === 'admin' || i.lab === activeRole));
            
            const filtered = schoolInventory.filter(item => {
                const matchesFilter = filter === 'all' || item.type === filter;
                const matchesSearch = item.name.includes(search) || item.code.includes(search);
                return matchesFilter && matchesSearch;
            });

            return (
                <div className="animate-in fade-in">
                    <ViewHeader title="جرد العهدة الفعلي" desc="الأصناف والمواد المتوفرة بالمعمل وإدارة المحاضر" />
                    
                    {incidentForm && (
                        <div className="bg-red-50 border border-red-200 rounded-3xl p-8 shadow-md mb-8 relative animate-in">
                            <button onClick={()=>setIncidentForm(null)} className="absolute top-5 left-5 text-red-400 hover:text-red-700 bg-white rounded-full p-1 shadow-sm"><XCircle/></button>
                            <h3 className="text-2xl font-black text-red-800 mb-6 flex items-center gap-3">
                                <div className="bg-red-100 p-2 rounded-xl">{incidentForm.type === 'كسر' ? <Hammer className="text-red-600"/> : <FileMinus className="text-red-600"/>}</div>
                                إصدار محضر {incidentForm.type} للصنف: {incidentForm.item.name}
                            </h3>
                            <form onSubmit={submitIncident} className="grid grid-cols-2 md:grid-cols-4 gap-5">
                                <div><label className="block text-sm font-bold mb-2 text-red-900">الكمية (المتاح {incidentForm.item.quantity})</label><input required type="number" min="0.1" step="0.1" value={incidentData.qty} onChange={e=>setIncidentData({...incidentData, qty: e.target.value})} className="w-full p-3 border border-red-200 rounded-xl outline-none focus:ring-2 focus:ring-red-400 bg-white" /></div>
                                <div><label className="block text-sm font-bold mb-2 text-red-900">التاريخ</label><input required type="date" value={incidentData.date} onChange={e=>setIncidentData({...incidentData, date: e.target.value})} className="w-full p-3 border border-red-200 rounded-xl outline-none focus:ring-2 focus:ring-red-400 bg-white" /></div>
                                <div><label className="block text-sm font-bold mb-2 text-red-900">اليوم</label><select value={incidentData.day} onChange={e=>setIncidentData({...incidentData, day: e.target.value})} className="w-full p-3 border border-red-200 rounded-xl bg-white outline-none focus:ring-2 focus:ring-red-400"><option value="">-</option>{days.map(d=><option key={d}>{d}</option>)}</select></div>
                                <div><label className="block text-sm font-bold mb-2 text-red-900">الحصة</label><select value={incidentData.period} onChange={e=>setIncidentData({...incidentData, period: e.target.value})} className="w-full p-3 border border-red-200 rounded-xl bg-white outline-none focus:ring-2 focus:ring-red-400"><option value="">-</option>{periods.map(p=><option key={p}>{p}</option>)}</select></div>
                                <div><label className="block text-sm font-bold mb-2 text-red-900">الفصل</label><select value={incidentData.gradeClass} onChange={e=>setIncidentData({...incidentData, gradeClass: e.target.value})} className="w-full p-3 border border-red-200 rounded-xl bg-white outline-none focus:ring-2 focus:ring-red-400"><option value="">-</option>{allClasses.map(c=><option key={c}>{c}</option>)}</select></div>
                                <div><label className="block text-sm font-bold mb-2 text-red-900">المعلم المتواجد</label><select value={incidentData.teacher} onChange={e=>setIncidentData({...incidentData, teacher: e.target.value})} className="w-full p-3 border border-red-200 rounded-xl bg-white outline-none focus:ring-2 focus:ring-red-400"><option value="">-</option>{labTeachers.map(t=><option key={t.id}>{t.name}</option>)}</select></div>
                                <div className="col-span-2"><label className="block text-sm font-bold mb-2 text-red-900">المسؤول عن ال{incidentForm.type} (اسم الطالب/الشخص)</label><input required type="text" value={incidentData.responsible} onChange={e=>setIncidentData({...incidentData, responsible: e.target.value})} className="w-full p-3 border border-red-200 rounded-xl outline-none focus:ring-2 focus:ring-red-400 bg-white" placeholder="اكتب الاسم للتوثيق..." /></div>
                                <div className="col-span-2 md:col-span-4 mt-2">
                                    <button type="submit" className="bg-red-600 text-white font-bold px-8 py-3.5 rounded-xl shadow-lg hover:bg-red-700 transition-all active:scale-95 flex items-center justify-center w-full md:w-auto gap-2 text-lg"><CheckCircle2/> تأكيد الاعتماد وإصدار المحضر</button>
                                </div>
                            </form>
                        </div>
                    )}

                    <div className="flex flex-col md:flex-row justify-between items-center gap-4 mb-6">
                        <div className="relative w-full md:w-96">
                            <Search className="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 w-5 h-5" />
                            <input type="text" placeholder="بحث باسم الصنف أو الكود..." value={search} onChange={(e) => setSearch(e.target.value)} className="w-full pl-4 pr-12 py-3.5 border border-slate-300 rounded-2xl outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 font-bold text-sm shadow-sm transition-all" />
                        </div>
                        <div className="flex gap-2 bg-slate-100 p-1.5 rounded-xl shadow-inner w-full md:w-auto overflow-x-auto">
                            <button onClick={() => setFilter('all')} className={`px-5 py-2.5 rounded-lg text-sm font-bold whitespace-nowrap transition-all ${filter === 'all' ? 'bg-white shadow-sm text-blue-700' : 'text-slate-600 hover:bg-slate-200'}`}>عرض الكل</button>
                            <button onClick={() => setFilter('permanent')} className={`px-5 py-2.5 rounded-lg text-sm font-bold whitespace-nowrap transition-all ${filter === 'permanent' ? 'bg-white shadow-sm text-blue-700' : 'text-slate-600 hover:bg-slate-200'}`}>مواد مستديمة</button>
                            <button onClick={() => setFilter('consumable')} className={`px-5 py-2.5 rounded-lg text-sm font-bold whitespace-nowrap transition-all ${filter === 'consumable' ? 'bg-white shadow-sm text-blue-700' : 'text-slate-600 hover:bg-slate-200'}`}>مواد مستهلكة</button>
                        </div>
                    </div>
                    
                    <div className="bg-white border border-slate-200 rounded-3xl overflow-hidden shadow-sm">
                        <table className="w-full text-right text-sm">
                            <thead className="bg-slate-50/80 border-b border-slate-200">
                                <tr>
                                    <th className="p-5 font-bold text-slate-600">الكود / الباركود</th><th className="p-5 font-bold text-slate-600">اسم الصنف</th><th className="p-5 font-bold text-slate-600">النوع</th><th className="p-5 font-bold text-slate-600">الرصيد الفعلي</th><th className="p-5 text-center font-bold text-slate-600">المحاضر</th>
                                </tr>
                            </thead>
                            <tbody className="divide-y divide-slate-100">
                                {filtered.map(item => (
                                    <tr key={item.id} className="hover:bg-slate-50/50 transition-colors group">
                                        <td className="p-5"><div className="font-mono font-bold text-slate-700 bg-slate-100 w-max px-2 py-0.5 rounded border border-slate-200">{item.code}</div><div className="text-[10px] text-slate-400 mt-1 flex items-center gap-1"><Barcode className="w-3 h-3"/> {item.barcode}</div></td>
                                        <td className="p-5 font-bold text-slate-800 text-base">{item.name}</td>
                                        <td className="p-5"><span className={`px-3 py-1 rounded-full text-xs font-bold border ${item.type === 'permanent' ? 'bg-purple-50 text-purple-700 border-purple-100' : 'bg-orange-50 text-orange-700 border-orange-100'}`}>{item.type === 'permanent' ? 'مستديم' : 'مستهلك'}</span></td>
                                        <td className="p-5 font-black text-xl text-blue-600">{item.quantity} <span className="text-xs font-bold text-slate-500 ml-1">{item.unit}</span></td>
                                        <td className="p-5 text-center">
                                            {item.type === 'permanent' && item.quantity > 0 && user.type !== 'teacher' ? (
                                                <div className="flex justify-center gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
                                                    <button onClick={()=>setIncidentForm({ type:'كسر', item })} className="bg-red-50 hover:bg-red-100 text-red-600 border border-red-200 px-3 py-1.5 rounded-lg text-xs font-bold flex items-center gap-1.5 transition-colors"><Hammer className="w-3.5 h-3.5"/> كسر</button>
                                                    <button onClick={()=>setIncidentForm({ type:'فقد', item })} className="bg-orange-50 hover:bg-orange-100 text-orange-600 border border-orange-200 px-3 py-1.5 rounded-lg text-xs font-bold flex items-center gap-1.5 transition-colors"><FileMinus className="w-3.5 h-3.5"/> فقد</button>
                                                </div>
                                            ) : <span className="text-slate-300 text-xs font-bold opacity-0 group-hover:opacity-100 transition-opacity">-</span>}
                                        </td>
                                    </tr>
                                ))}
                                {filtered.length === 0 && <tr><td colSpan="5" className="p-12 text-center text-slate-400 font-bold text-lg">لا توجد أصناف مطابقة لعملية البحث في هذه المدرسة</td></tr>}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        }

        // --- التوريد ---
        function SupplyView({ inventory, setInventory, setTransactions, activeRole, user, appSettings, activeSchoolFilter }) {
            const [formData, setFormData] = useState({ name: '', type: 'consumable', quantity: '', unit: '', expiryDate: '', lab: activeRole });
            const [msg, setMsg] = useState('');
            const generateCode = (lab) => `${lab.substring(0, 3).toUpperCase()}-${Math.floor(100 + Math.random() * 900)}`;

            const handleSubmit = (e) => {
                e.preventDefault();
                const newCode = generateCode(formData.lab);
                const newBarcode = Math.floor(1000000 + Math.random() * 9000000).toString();
                const newItem = { id: Date.now().toString(), code: newCode, barcode: newBarcode, ...formData, quantity: parseFloat(formData.quantity), school: activeSchoolFilter };
                setInventory([...inventory, newItem]);
                setTransactions(prev => [...prev, { id: Date.now(), type: 'supply', item: newItem.name, quantity: newItem.quantity, date: new Date().toISOString(), user: user.name, lab: formData.lab, year: appSettings.currentYear, school: activeSchoolFilter }]);
                setMsg(`تم التوريد بنجاح لـ ${activeSchoolFilter}. الكود: ${newCode}`);
                setFormData({ name: '', type: 'consumable', quantity: '', unit: '', expiryDate: '', lab: activeRole });
                setTimeout(() => setMsg(''), 4000);
            };

            return (
                <div className="max-w-3xl mx-auto space-y-6 animate-in fade-in">
                    <ViewHeader title="إضافة أصناف جديدة (توريد)" desc="إدخال المواد للأرصدة وتوليد الباركود تلقائياً" />
                    {msg && <div className="bg-green-50 text-green-700 p-4 rounded-xl flex gap-2 font-bold border border-green-200 animate-in fade-in"><CheckCircle2/>{msg}</div>}
                    <form onSubmit={handleSubmit} className="bg-white border border-slate-200 rounded-3xl p-8 shadow-sm space-y-6">
                        <div className="grid grid-cols-2 gap-5">
                            <div className="col-span-2"><label className="block text-sm font-bold text-slate-700 mb-2">اسم الصنف</label><input required type="text" value={formData.name} onChange={e=>setFormData({...formData, name: e.target.value})} className="w-full p-3.5 border border-slate-300 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 font-bold text-slate-800" /></div>
                            <div><label className="block text-sm font-bold text-slate-700 mb-2">النوع</label><select value={formData.type} onChange={e=>setFormData({...formData, type: e.target.value})} className="w-full p-3.5 border border-slate-300 rounded-xl bg-white outline-none focus:ring-2 focus:ring-blue-500 font-bold text-slate-800"><option value="consumable">مادة مستهلكة</option><option value="permanent">مادة مستديمة (عهدة)</option></select></div>
                            <div><label className="block text-sm font-bold text-slate-700 mb-2">الكمية</label><input required type="number" min="0.1" step="0.1" value={formData.quantity} onChange={e=>setFormData({...formData, quantity: e.target.value})} className="w-full p-3.5 border border-slate-300 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 font-bold text-slate-800" /></div>
                            <div><label className="block text-sm font-bold text-slate-700 mb-2">الوحدة القياسية</label><input required type="text" value={formData.unit} onChange={e=>setFormData({...formData, unit: e.target.value})} className="w-full p-3.5 border border-slate-300 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 font-bold text-slate-800" placeholder="لتر، جهاز، حبة..."/></div>
                            {formData.type === 'consumable' && <div><label className="block text-sm font-bold text-slate-700 mb-2">تاريخ الصلاحية</label><input required type="date" value={formData.expiryDate} onChange={e=>setFormData({...formData, expiryDate: e.target.value})} className="w-full p-3.5 border border-slate-300 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 font-bold text-slate-800" /></div>}
                        </div>
                        <button type="submit" className="w-full bg-blue-600 text-white font-bold py-4 mt-4 rounded-xl shadow-lg hover:shadow-blue-500/30 hover:bg-blue-700 transition-all text-lg flex items-center justify-center gap-2"><PackagePlus className="w-6 h-6"/> تسجيل الصنف في عهدة المدرسة</button>
                    </form>
                </div>
            );
        }

        // --- الاستهلاك ---
        function ConsumptionView({ inventory, setInventory, setTransactions, activeRole, user, appSettings, users, activeSchoolFilter }) {
            const consumableItems = inventory.filter(i => (!i.school || i.school === activeSchoolFilter) && i.lab === activeRole && i.type === 'consumable' && i.quantity > 0);
            const labTeachers = users.filter(u => (u.role === activeRole || u.role === 'all') && ['teacher', 'coordinator', 'supervisor'].includes(u.type) && (u.schools?.includes('الجميع') || u.schools?.includes(activeSchoolFilter) || !u.schools?.length));
            const allClasses = appSettings.grades.flatMap(g => appSettings.classes.map(c => `${g} / ${c}`));

            const [formData, setFormData] = useState({ itemId: '', qty: '', date: '', day: days[0], period: periods[0], gradeClass: '', teacher: '' });
            const [msg, setMsg] = useState('');

            const handleSubmit = (e) => {
                e.preventDefault();
                const itemIndex = inventory.findIndex(i => i.id === formData.itemId);
                const item = inventory[itemIndex];
                const consumeQty = parseFloat(formData.qty);
                if (consumeQty > item.quantity) return alert('الكمية المطلوبة أكبر من الرصيد المتاح!');
                
                const updated = [...inventory];
                updated[itemIndex].quantity -= consumeQty;
                setInventory(updated);
                
                const detailsStr = `الحصة: ${formData.period} | الفصل: ${formData.gradeClass} | المعلم: ${formData.teacher}`;
                
                setTransactions(prev => [...prev, { 
                    id: Date.now(), type: 'consumption', item: item.name, quantity: consumeQty, 
                    date: formData.date || new Date().toISOString().split('T')[0], 
                    user: formData.teacher || user.name, lab: activeRole, year: appSettings.currentYear, school: activeSchoolFilter,
                    details: detailsStr
                }]);
                
                setMsg('تم خصم الاستهلاك وتوثيقه في السجل بنجاح.');
                setFormData({ itemId: '', qty: '', date: '', day: days[0], period: periods[0], gradeClass: '', teacher: '' });
                setTimeout(() => setMsg(''), 4000);
            };

            return (
                <div className="max-w-4xl mx-auto space-y-6 animate-in fade-in">
                    <ViewHeader title="إثبات وتسجيل الاستهلاك" desc="خصم المواد المستهلكة أثناء التجارب وربطها بالمعلم والفصل" />
